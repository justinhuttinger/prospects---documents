
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Bebas Neue is the free Google-Fonts fallback for Prohibition (tall condensed
     all-caps). If the host WordPress page already loads Prohibition (via
     Elementor's font kit), it wins through the CSS cascade. -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  /* Scope everything to #wcs-join-app so host site styles don't leak in. */
  #wcs-join-app, #wcs-join-app *, #wcs-join-app *::before, #wcs-join-app *::after {
    box-sizing: border-box;
  }
  #wcs-join-app {
    /* === Brand tokens ============================================ */
    --w-canvas: #0a0a0c;
    --w-canvas-soft: #15151a;
    --w-surface: #ffffff;
    --w-surface-soft: #f6f6f4;     /* warm off-white for input bg */
    --w-ink: #0a0a0c;              /* primary text */
    --w-ink-muted: #6b6b73;
    --w-ink-soft: #a0a0a8;
    --w-on-dark: #f5f5f2;
    --w-on-dark-muted: #9a9aa3;
    --w-border: #ececea;
    --w-border-strong: #1a1a1f;    /* used for emphasis on the card */
    --w-red: #ff0000;
    --w-red-dark: #cc0000;
    --w-red-soft: #ffe5e5;
    --w-success: #16a34a;
    --w-error: #dc2626;

    /* === Type ==================================================== */
    /* Prohibition is WCS's brand display font. If the host WordPress
       page loads it (Elementor font kit), it wins via the cascade.
       Bebas Neue is the free Google Fonts fallback that captures the
       same tall-condensed-all-caps energy. */
    --w-display: 'Prohibition', 'Bebas Neue', 'Anton', 'Archivo Black', 'Impact', sans-serif;
    --w-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --w-mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;

    font-family: var(--w-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: var(--w-ink);
    font-size: 15px;
    line-height: 1.55;
    padding: 40px 20px;
    /* User-provided canvas background. Cover-fit so it scales to any
       viewport; fixed so it doesn't scroll under the panel; fallback
       to a near-white tone for the brief moment before the image loads. */
    background:
      url('https://prospects-documents.onrender.com/widget-assets/online-join-bg.png') center / cover no-repeat fixed,
      #f6f6f4;
    min-height: 100%;
  }
  @media (max-width: 640px) {
    #wcs-join-app { padding: 24px 14px; }
  }
  @media (max-width: 380px) {
    #wcs-join-app { padding: 16px 10px; font-size: 14px; }
  }

  #wcs-join-app .wcs-container {
    max-width: 720px;
    margin: 0 auto;
  }

  /* === Brand block over the canvas ============================== */
  #wcs-join-app .wcs-brand {
    text-align: center;
    color: var(--w-ink);
    margin-bottom: 28px;
  }
  #wcs-join-app .wcs-brand-logo {
    /* Repurposed as a small line-marked monogram. JS still injects "W". */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px; height: 44px;
    margin-bottom: 14px;
    border-radius: 50%;
    background: var(--w-red);
    color: #fff;
    font-family: var(--w-display);
    font-size: 18px;
    box-shadow: 0 0 0 6px rgba(255, 0, 0, 0.12);
  }
  /* Brand block on the light canvas — black-on-transparent badge reads
     as-is, no inversion. Wordmark fallback also renders in ink. */
  #wcs-join-app .wcs-brand-image {
    display: inline-block;
    max-width: 180px;
    max-height: 180px;
    width: auto; height: auto;
    object-fit: contain;
  }
  #wcs-join-app .wcs-brand-wordmark {
    font-family: var(--w-display);
    font-size: 42px;
    line-height: 1;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--w-ink);
  }
  @media (max-width: 520px) {
    #wcs-join-app .wcs-brand-wordmark { font-size: 32px; }
    #wcs-join-app .wcs-brand-image { max-width: 132px; max-height: 132px; }
  }
  @media (max-width: 380px) {
    #wcs-join-app .wcs-brand-wordmark { font-size: 26px; }
    #wcs-join-app .wcs-brand-image { max-width: 104px; max-height: 104px; }
    #wcs-join-app .wcs-brand { margin-bottom: 18px; }
  }

  #wcs-join-app .wcs-brand-title {
    font-family: var(--w-display);
    font-size: 26px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--w-ink);
    line-height: 1;
  }
  #wcs-join-app .wcs-brand-sub {
    font-family: var(--w-body);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--w-ink-muted);
    margin-top: 10px;
  }

  /* === The card =================================================== */
  #wcs-join-app .wcs-panel {
    background: var(--w-surface);
    border: 1px solid var(--w-border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      0 24px 48px -16px rgba(10, 10, 12, 0.18),
      0 2px 6px rgba(10, 10, 12, 0.06);
    position: relative;
  }
  /* Red top accent strip — running across the card to anchor identity. */
  #wcs-join-app .wcs-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--w-red);
  }

  /* Header band — uppercase eyebrow + display headline */
  #wcs-join-app .wcs-panel-header {
    padding: 36px 32px 24px;
    background: var(--w-surface);
  }
  /* Step 1 only — embed the WCS badge inline with the step header so
     members get a brand moment on entry without inflating every step. */
  #wcs-join-app .wcs-panel-header--with-logo {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  #wcs-join-app .wcs-panel-header--with-logo .wcs-panel-header-text {
    flex: 1; min-width: 0;
  }
  #wcs-join-app .wcs-step1-logo {
    flex-shrink: 0;
    width: 78px; height: 78px;
    object-fit: contain;
  }
  @media (max-width: 380px) {
    #wcs-join-app .wcs-panel-header--with-logo { gap: 14px; }
    #wcs-join-app .wcs-step1-logo { width: 62px; height: 62px; }
  }
  @media (max-width: 520px) {
    #wcs-join-app .wcs-panel-header { padding: 28px 20px 18px; }
  }
  @media (max-width: 380px) {
    #wcs-join-app .wcs-panel-header { padding: 24px 14px 14px; }
    #wcs-join-app .wcs-panel-progress { padding: 0 14px 14px; }
    #wcs-join-app .wcs-panel-body { padding: 12px 14px 20px; }
    #wcs-join-app .wcs-panel-footer { padding: 14px 14px 18px; }
  }
  #wcs-join-app .wcs-eyebrow {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--w-red);
    margin-bottom: 14px;
  }
  #wcs-join-app .wcs-step-tag {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--w-ink-soft);
  }
  #wcs-join-app .wcs-panel-header h1 {
    font-family: var(--w-display);
    font-size: 36px;
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    color: var(--w-ink);
    margin: 0 0 8px;
  }
  @media (max-width: 520px) {
    #wcs-join-app .wcs-panel-header h1 { font-size: 28px; }
  }
  @media (max-width: 380px) {
    #wcs-join-app .wcs-panel-header h1 { font-size: 22px; }
    #wcs-join-app .wcs-eyebrow,
    #wcs-join-app .wcs-step-tag { font-size: 10px; letter-spacing: 0.16em; }
  }
  #wcs-join-app .wcs-panel-header p {
    color: var(--w-ink-muted);
    font-size: 14px;
    line-height: 1.5;
  }

  /* Progress: a thin bar of pill-numbers right under the header. */
  #wcs-join-app .wcs-panel-progress {
    display: flex; align-items: center; gap: 6px;
    padding: 0 32px 20px;
    background: var(--w-surface);
  }
  @media (max-width: 520px) {
    #wcs-join-app .wcs-panel-progress { padding: 0 20px 16px; gap: 4px; }
  }
  #wcs-join-app .wcs-progress-pill {
    flex: 1;
    height: 4px;
    background: var(--w-border);
    border-radius: 999px;
    transition: background 0.25s ease;
  }
  #wcs-join-app .wcs-progress-pill.is-active { background: var(--w-red); }
  #wcs-join-app .wcs-progress-pill.is-done { background: var(--w-ink); }
  /* Legacy single-bar fallback (if the JS still writes wcs-panel-progress-fill). */
  #wcs-join-app .wcs-panel-progress-fill {
    height: 100%;
    background: var(--w-red);
    transition: width 0.25s ease;
  }

  /* Body & footer */
  #wcs-join-app .wcs-panel-body {
    padding: 16px 32px 28px;
    background: var(--w-surface);
  }
  @media (max-width: 520px) {
    #wcs-join-app .wcs-panel-body { padding: 12px 20px 22px; }
  }
  #wcs-join-app .wcs-panel-footer {
    padding: 18px 32px 28px;
    background: var(--w-surface);
    border-top: 1px solid var(--w-border);
    display: flex; flex-direction: column; gap: 10px;
  }
  @media (max-width: 520px) {
    #wcs-join-app .wcs-panel-footer { padding: 16px 20px 22px; }
  }

  /* Headlines inside body — used by JS-rendered sub-sections */
  #wcs-join-app h1, #wcs-join-app h2, #wcs-join-app h3, #wcs-join-app h4 {
    color: var(--w-ink);
    margin: 0;
    font-family: var(--w-body);
    letter-spacing: -0.005em;
  }
  #wcs-join-app .wcs-panel-body h1 { font-size: 22px; font-weight: 800; }
  #wcs-join-app h2 { font-size: 18px; font-weight: 700; }
  #wcs-join-app h3 { font-size: 14px; font-weight: 700; }
  #wcs-join-app p { margin: 0; color: var(--w-ink-muted); font-size: 14px; }
  #wcs-join-app .wcs-hint { color: var(--w-ink-soft); font-size: 12px; }

  /* === Sections =================================================== */
  #wcs-join-app .wcs-section + .wcs-section { margin-top: 26px; }
  #wcs-join-app .wcs-section-label {
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--w-ink);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  #wcs-join-app .wcs-section-label::after {
    content: '';
    flex: 1; height: 1px;
    background: var(--w-border);
  }

  /* === Buttons ==================================================== */
  #wcs-join-app .wcs-btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 16px 22px; border-radius: 2px;
    font-family: var(--w-body);
    font-weight: 800; font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer; border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.05s ease-out;
    line-height: 1;
  }
  #wcs-join-app .wcs-btn:active { transform: translateY(1px); }
  #wcs-join-app .wcs-btn-primary {
    background: var(--w-ink); color: #fff; width: 100%;
  }
  #wcs-join-app .wcs-btn-primary:hover { background: var(--w-red); }
  #wcs-join-app .wcs-btn-primary:disabled {
    background: var(--w-ink-soft); color: #fff; cursor: not-allowed;
    opacity: 0.6;
  }
  #wcs-join-app .wcs-btn-secondary {
    background: transparent; color: var(--w-ink); border-color: var(--w-border);
    width: 100%;
  }
  #wcs-join-app .wcs-btn-secondary:hover {
    background: var(--w-surface-soft); border-color: var(--w-ink);
  }
  #wcs-join-app .wcs-btn-cta {
    padding: 18px 24px;
  }

  /* === Form fields ================================================= */
  #wcs-join-app .wcs-field { margin-bottom: 14px; }
  #wcs-join-app .wcs-field label {
    display: block; font-size: 10px; font-weight: 800;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--w-ink);
    margin-bottom: 6px;
  }
  #wcs-join-app .wcs-field input,
  #wcs-join-app .wcs-field select,
  #wcs-join-app .wcs-field textarea {
    width: 100%;
    padding: 14px 14px;
    border: 1px solid var(--w-border);
    border-radius: 2px;
    font-size: 15px; font-family: inherit;
    background: var(--w-surface);
    color: var(--w-ink);
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  #wcs-join-app .wcs-field input:hover,
  #wcs-join-app .wcs-field select:hover {
    border-color: var(--w-ink-soft);
  }
  #wcs-join-app .wcs-field input:focus,
  #wcs-join-app .wcs-field select:focus,
  #wcs-join-app .wcs-field textarea:focus {
    outline: none;
    border-color: var(--w-ink);
    box-shadow: 0 0 0 3px rgba(10, 10, 12, 0.06);
  }
  #wcs-join-app .wcs-field input.is-error,
  #wcs-join-app .wcs-field select.is-error {
    border-color: var(--w-error);
    box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.10);
  }
  #wcs-join-app .wcs-field-error {
    color: var(--w-error); font-size: 12px; margin-top: 6px;
    font-weight: 500;
  }
  #wcs-join-app .wcs-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  #wcs-join-app .wcs-row-3 {
    display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px;
  }
  @media (max-width: 520px) {
    #wcs-join-app .wcs-row, #wcs-join-app .wcs-row-3 { grid-template-columns: 1fr; }
  }

  /* === Plan cards (horizontal grid) =============================== */
  #wcs-join-app .wcs-plan-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
    gap: 12px;
    align-items: stretch;
  }
  @media (max-width: 540px) {
    #wcs-join-app .wcs-plan-list { grid-template-columns: 1fr; }
  }
  #wcs-join-app .wcs-plan-card {
    border: 1px solid var(--w-ink);
    border-radius: 2px;
    background: var(--w-surface);
    position: relative;
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: transform 0.12s ease-out, box-shadow 0.12s ease-out;
  }
  #wcs-join-app .wcs-plan-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px -10px rgba(10, 10, 12, 0.22);
  }
  #wcs-join-app .wcs-plan-card.is-selected {
    box-shadow: 0 0 0 2px var(--w-red), 0 12px 28px -10px rgba(255, 0, 0, 0.25);
  }
  /* Black header bar with the plan name in white. */
  #wcs-join-app .wcs-plan-card-header {
    background: var(--w-ink);
    color: #fff;
    text-align: center;
    padding: 16px 18px;
    font-family: var(--w-display);
    font-size: 22px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1;
    position: relative;
  }
  #wcs-join-app .wcs-plan-card-body {
    padding: 4px 22px 22px;
    display: flex; flex-direction: column;
    flex: 1;
  }
  #wcs-join-app .wcs-plan-badge {
    position: absolute; top: 12px; right: 12px;
    background: var(--w-red); color: #fff;
    padding: 3px 8px; border-radius: 2px;
    font-size: 9px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.18em;
  }
  #wcs-join-app .wcs-plan-description {
    font-size: 13px; color: var(--w-ink);
    line-height: 1.55;
    text-align: center;
    margin-top: 4px;
  }
  @media (max-width: 380px) {
    #wcs-join-app .wcs-plan-card-header { font-size: 18px; padding: 14px 14px; }
    #wcs-join-app .wcs-plan-card-body { padding: 4px 14px 16px; }
  }
  /* Marketing-style price hero — large monthly figure centered, with a
     small "$" prefix and "Per Month" + "$X ENROLLMENT" subtext stacked
     below. Plays the role of the old itemized block but reads like a
     pricing brochure. Total-due-today figure moves to step 6, where the
     itemized confirmation lives. */
  #wcs-join-app .wcs-plan-hero {
    text-align: center;
    padding: 22px 0 16px;
  }
  /* Wrap is inline-block so the parent .wcs-plan-hero centers it. The
     $ sign is absolutely positioned to the LEFT of the number — that
     way the digits themselves are dead-center, and the $ floats next
     to them without shifting the optical center. */
  #wcs-join-app .wcs-plan-hero-amount {
    display: inline-block;
    position: relative;
    font-family: var(--w-display);
    line-height: 0.9;
    color: var(--w-ink);
  }
  #wcs-join-app .wcs-plan-hero-amount .wcs-plan-hero-cur {
    position: absolute;
    right: 100%;
    top: 6px;
    padding-right: 6px;
    font-size: 28px;
    line-height: 1.1;
  }
  #wcs-join-app .wcs-plan-hero-amount .wcs-plan-hero-num {
    display: inline-block;
    font-size: 88px;
    letter-spacing: -0.02em;
  }
  #wcs-join-app .wcs-plan-hero-period {
    font-size: 13px; font-weight: 600;
    color: var(--w-ink);
    margin-top: 6px;
  }
  #wcs-join-app .wcs-plan-hero-enroll {
    font-size: 12px; font-weight: 800;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--w-ink);
    margin-top: 4px;
  }
  @media (max-width: 380px) {
    #wcs-join-app .wcs-plan-hero-amount .wcs-plan-hero-num { font-size: 68px; }
    #wcs-join-app .wcs-plan-hero-amount .wcs-plan-hero-cur { font-size: 22px; padding-top: 4px; }
  }

  /* "What's included" amenities list — cleaner, more breathable, with
     a small section header so the features feel intentional instead
     of dropped-in. */
  #wcs-join-app .wcs-plan-features-header {
    margin: 18px 0 10px;
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--w-ink);
    display: flex; align-items: center; gap: 10px;
  }
  #wcs-join-app .wcs-plan-features-header::after {
    content: '';
    flex: 1; height: 1px; background: var(--w-border);
  }
  /* Features list — centered rows separated by hairline rules. Each
     item has an outline-circle check icon (inline SVG) to its left. */
  #wcs-join-app .wcs-plan-card ul {
    margin: 0; padding: 0;
    list-style: none;
    display: flex; flex-direction: column;
    border-top: 1px solid var(--w-border);
  }
  #wcs-join-app .wcs-plan-card ul li {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px 14px;
    font-size: 13px; color: var(--w-ink);
    line-height: 1.4;
    text-align: center;
    border-bottom: 1px solid var(--w-border);
  }
  #wcs-join-app .wcs-plan-card ul li:last-child { border-bottom: 0; }
  #wcs-join-app .wcs-plan-check {
    flex-shrink: 0;
    width: 18px; height: 18px;
    color: var(--w-ink);
  }

  /* Sign-up CTA at the bottom of each plan card. Clicking selects the
     plan AND advances to step 3 in one tap. */
  #wcs-join-app .wcs-plan-card-cta {
    margin-top: auto;
    background: var(--w-red);
    color: #fff;
    border: 0;
    width: 100%;
    padding: 16px 18px;
    font-family: var(--w-body);
    font-weight: 800; font-size: 13px;
    letter-spacing: 0.22em; text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  #wcs-join-app .wcs-plan-card-cta:hover { background: var(--w-red-dark); }
  #wcs-join-app .wcs-plan-card-cta:active { transform: translateY(1px); }

  /* === Payment method choice ====================================== */
  #wcs-join-app .wcs-pm-list {
    display: flex; flex-direction: column; gap: 10px;
  }
  #wcs-join-app .wcs-pm-card {
    display: flex; align-items: center; gap: 16px;
    border: 1px solid var(--w-border);
    border-radius: 2px;
    padding: 18px 20px;
    cursor: pointer;
    background: var(--w-surface);
    transition: border-color 0.12s, transform 0.12s ease-out;
  }
  #wcs-join-app .wcs-pm-card:hover {
    border-color: var(--w-ink);
    transform: translateY(-1px);
  }
  #wcs-join-app .wcs-pm-card.is-selected {
    border-color: var(--w-ink);
    box-shadow: inset 4px 0 0 var(--w-red);
  }
  #wcs-join-app .wcs-pm-icon {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--w-surface-soft);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.12s;
  }
  #wcs-join-app .wcs-pm-icon svg {
    width: 18px; height: 18px; color: var(--w-ink);
  }
  #wcs-join-app .wcs-pm-card.is-selected .wcs-pm-icon { background: var(--w-red); }
  #wcs-join-app .wcs-pm-card.is-selected .wcs-pm-icon svg { color: #fff; }
  #wcs-join-app .wcs-pm-savings {
    display: inline-block;
    background: var(--w-red); color: #fff;
    padding: 3px 8px; border-radius: 2px;
    font-size: 9px; font-weight: 800;
    letter-spacing: 0.18em; text-transform: uppercase;

  /* === Location picker (step 1) =================================== */

  @media (max-width: 520px) {

  /* Scrollable agreement block. Subtle inner shadow signals scroll. */
  #wcs-join-app .wcs-agreement-scroll {

  #wcs-join-app .wcs-agreement-section p { margin: 0 0 8px; font-size: 12px; color: var(--w-ink); text-align: justify; }
  #wcs-join-app .wcs-agreement-section ol {

  }
  #wcs-join-app .wcs-agreement-section ol li {

  #wcs-join-app .wcs-agreement-section .wcs-agreement-note {

  /* Signature pad. */
  #wcs-join-app .wcs-sig-pad-wrap {
    position: relative;
    border: 1px solid var(--w-ink);

  #wcs-join-app .wcs-sig-canvas {

      linear-gradient(transparent calc(180px - 32px), var(--w-border) calc(180px - 32px), var(--w-border) calc(180px - 31px), transparent calc(180px - 31px));

  /* Scroll-to-bottom gate hint (shown until the agreement is fully read). */

<div id="wcs-join-app" data-location="">
  <div class="wcs-container">
    <div class="wcs-panel">
      <div class="wcs-panel-body wcs-loading-block">
        <span class="wcs-spinner"></span>
        <p>Loading</p>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const API_BASE = (window.WCS_JOIN_API_BASE || 'https://prospects-documents.onrender.com') + '/api/online-join';
  const PAYPAGE_ORIGIN = 'https://apipayservice.abcfinancial.net';
  const STORAGE_KEY = 'wcs_join_state_v1';
  const STORAGE_TTL_MS = 60 * 60 * 1000;
  const TOTAL_STEPS = 7;

  const root = document.getElementById('wcs-join-app');
  if (!root) return;

  // Persistence is intentionally OFF — wipe anything left from older builds
  // so a refresh always starts from step 1 with empty fields.
  try {
    Object.keys(sessionStorage).forEach(k => {
      if (k.startsWith('wcs_join_state_v1')) sessionStorage.removeItem(k);
    });
  } catch (_) {}

  // Default location is now OPTIONAL — when not provided the user picks from
  // the list on step 1. If data-location or ?location= is set, that becomes
  // the pre-selected default in the picker.
  function resolveDefaultLocation() {
    const fromAttr = (root.dataset.location || '').trim().toLowerCase();
    if (fromAttr) return fromAttr;
    try {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = (params.get('location') || '').trim().toLowerCase();
      if (fromQuery) return fromQuery;
    } catch (_) {}
    return null;
  }
  const DEFAULT_LOCATION_ID = resolveDefaultLocation();

  // sessionStorage key is now scoped to "global" since location isn't fixed.
  // When a location is picked we still namespace per-location for plan/contact
  // state, so each location's draft stays separate.
  const GLOBAL_STORAGE_KEY = STORAGE_KEY + ':global';
  function locationStorageKey(slug) { return STORAGE_KEY + ':' + slug; }

  // ----- State ------------------------------------------------------------
  const state = {
    currentStep: 1,
    locations: [],          // full active-locations list (loaded once)
    locationsError: null,
    currentLocationId: null, // null until user picks (or pre-set)
    config: null,            // config for currentLocationId (null until picked)
    locationLoading: false,
    selectedPlan: null,
    contact: {
      first_name: '', last_name: '', email: '', cell_phone: '',
      birthday: '', gender: '',
      address_line1: '', address_line2: '', city: '', state: 'OR', zip_code: '',
    },
    emergencyContact: { first_name: '', last_name: '', phone: '' },
    marketing: { email: true, sms: true },
    termsAccepted: false,
    paymentMethodChoice: null,
    signupId: null,
    paypageUrl: null,
    successData: null,
    inlineErrors: {},
    flashMessage: null,
    // Step 5 -> step 6 hand-off (set when PayPage posts a transaction ID,
    // consumed by the Confirm Membership button on step 6).
    paypageTransactionId: null,
    paypagePaymentType: null,
    // Step 6 — Review & Sign.
    signatureDataUrl: null,
    signatureHasInk: false,
    typedSignature: '',
    agreementAcknowledged: false,
    agreementScrolledToBottom: false,
    submittingAgreement: false,
  };

  // Persistence intentionally disabled — per request, a refresh starts the
  // member over from step 1 with no carryover. The functions stay defined
  // so existing call-sites compile; they're just no-ops. clearStoredState
  // still wipes anything left from older builds.
  function saveState() { /* no-op */ }
  // Persistence intentionally disabled — always start fresh.
  function loadStoredStateFor() { return null; }
  function loadStoredGlobal() { return null; }
  function clearStoredState() {
    if (!state.currentLocationId) return;
    try {
      sessionStorage.removeItem(locationStorageKey(state.currentLocationId));
      sessionStorage.removeItem(GLOBAL_STORAGE_KEY);
    } catch (_) {}
  }

  // ----- Helpers ----------------------------------------------------------
  function readCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : null;
  }
  function captureAttribution() {
    const params = new URLSearchParams(window.location.search);
    return {
      fbclid: params.get('fbclid') || readCookie('_fbc') || null,
      fbp: readCookie('_fbp') || null,
      utm_source: params.get('utm_source') || null,
      utm_medium: params.get('utm_medium') || null,
      utm_campaign: params.get('utm_campaign') || null,
    };
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function formatPhoneInput(value) {
    const digits = String(value || '').replace(/\D/g, '').slice(0, 10);
    if (digits.length < 4) return digits;
    if (digits.length < 7) return `(${digits.slice(0,3)}) ${digits.slice(3)}`;
    return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
  }
  // Birthday input: auto-format the digits the member types as MM/DD/YYYY.
  // We do this so they never have to touch a native date picker (the
  // mobile UX was unreliable). Stored internally in ISO YYYY-MM-DD for
  // the server, but displayed and typed as MM/DD/YYYY.
  function formatBirthdayInput(value) {
    const digits = String(value || '').replace(/\D/g, '').slice(0, 8);
    if (digits.length < 3) return digits;
    if (digits.length < 5) return `${digits.slice(0,2)}/${digits.slice(2)}`;
    return `${digits.slice(0,2)}/${digits.slice(2,4)}/${digits.slice(4)}`;
  }
  // Convert MM/DD/YYYY → YYYY-MM-DD for server submission. Returns the
  // ISO string when valid, '' when the input isn't a complete date.
  function birthdayToIso(displayed) {
    const m = String(displayed || '').match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (!m) return '';
    const [_, mm, dd, yyyy] = m;
    // Sanity-check the month/day so 13/45/2000 doesn't slip through.
    const mi = parseInt(mm, 10), di = parseInt(dd, 10), yi = parseInt(yyyy, 10);
    if (mi < 1 || mi > 12 || di < 1 || di > 31 || yi < 1900 || yi > 2200) return '';
    return `${yyyy}-${mm}-${dd}`;
  }
  function money(n) {
    const num = Number(n);
    if (Number.isNaN(num)) return '';
    return num % 1 === 0 ? `$${num}` : `$${num.toFixed(2)}`;
  }
  function clientValidateContact() {
    const errors = {};
    const c = state.contact;
    if (!c.first_name.trim()) errors.first_name = 'Required.';
    if (!c.last_name.trim()) errors.last_name = 'Required.';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(c.email)) errors.email = 'Invalid email.';
    if (c.cell_phone.replace(/\D/g, '').length !== 10) errors.cell_phone = '10 digits.';
    // birthday is displayed/typed as MM/DD/YYYY; valid means it converts to ISO.
    if (!birthdayToIso(c.birthday)) errors.birthday = 'MM/DD/YYYY required.';
    if (!c.address_line1.trim()) errors.address_line1 = 'Required.';
    if (!c.city.trim()) errors.city = 'Required.';
    if (!/^[A-Za-z]{2}$/.test(c.state || '')) errors.state = '2 letters.';
    if (!/^\d{5}(-\d{4})?$/.test(c.zip_code)) errors.zip_code = 'Required.';
    const ec = state.emergencyContact;
    if (!ec.first_name.trim()) errors.ec_first_name = 'Required.';
    if (!ec.last_name.trim()) errors.ec_last_name = 'Required.';
    if (ec.phone.replace(/\D/g, '').length !== 10) errors.ec_phone = '10 digits.';
    if (!state.termsAccepted) errors.terms = 'Required.';
    return errors;
  }

  // ----- API --------------------------------------------------------------
  async function api(path, opts) {
    const res = await fetch(API_BASE + path, opts);
    let body = null;
    try { body = await res.json(); } catch (_) {}
    return { ok: res.ok, status: res.status, body };
  }
  async function fetchLocations() {
    const r = await api('/locations');
    if (!r.ok) throw new Error(r.body?.error || `Failed to load locations (${r.status})`);
    return r.body?.locations || [];
  }
  async function fetchConfig(slug) {
    const r = await api(`/config/${encodeURIComponent(slug)}`);
    if (!r.ok) throw new Error(r.body?.error || `Failed to load (${r.status})`);
    return r.body;
  }
  async function checkEligibility(planId, birthday) {
    return api('/eligibility', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan_id: planId, birthday }),
    });
  }
  async function startSignup() {
    // birthday is held in state as MM/DD/YYYY (display format) — convert
    // to ISO YYYY-MM-DD here for the server.
    const contactForServer = {
      ...state.contact,
      birthday: birthdayToIso(state.contact.birthday),
    };
    return api('/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        wcs_location_id: state.currentLocationId,
        plan_id: state.selectedPlan.id,
        payment_method_choice: state.paymentMethodChoice,
        contact: contactForServer,
        emergency_contact: state.emergencyContact,
        marketing: state.marketing,
        attribution: captureAttribution(),
      }),
    });
  }
  async function submitAgreement(transactionId, paymentType) {
    return api('/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        signup_id: state.signupId,
        paypage_transaction_id: transactionId,
        paypage_payment_type: paymentType,
      }),
    });
  }

  // ----- Agreement body HTML (legal text shown on step 6) -----------------
  // Mirrors services/online-join/agreement-html.js on the server. The signed
  // PDF that gets uploaded to the member's ABC account uses the same wording.
  function getAgreementBodyHtml() {
    return `
      <section class="wcs-agreement-section">
        <h4>Request For Preauthorized Payment</h4>
        <p>I/We hereby request the privilege of paying to ABC Fitness Solutions, LLC ("The Company"), Sherwood, AR 72124, and further authorize the Company to draw items (checks, electronic fund transfers, charge card) for the purpose of paying said payments, including any late fees or service fees, on the account listed above. Subject to the following conditions:</p>
        <ol>

  // ----- Agreement scroll gate -------------------------------------------
  // Member must scroll to the bottom of the agreement before they can
  // tick the "I have read and agree" checkbox.
  function initAgreementScrollGate() {
    const el = document.getElementById('wcs-agreement-scroll');
    if (!el) return;
    const cb = root.querySelector('[data-action="toggle-acknowledge"]');
    const hint = root.querySelector('.wcs-scroll-hint');
    function markRead() {
      if (state.agreementScrolledToBottom) return;
      state.agreementScrolledToBottom = true;
      if (cb) cb.disabled = false;
      if (hint) hint.style.display = 'none';
    }
    // Already fits without scrolling (e.g. on a tall desktop screen)?
    // Count as scrolled immediately.
    if (el.scrollHeight <= el.clientHeight + 4) {
      markRead();
      return;
    }
    el.addEventListener('scroll', () => {
      if (el.scrollTop + el.clientHeight >= el.scrollHeight - 8) markRead();
    }, { passive: true });
  }

  // ----- Signature pad ----------------------------------------------------
  let sigCtx = null;
  let sigDrawing = false;
  let sigLastPoint = null;
  function initSignaturePad() {
    const canvas = document.getElementById('wcs-sig-canvas');
    if (!canvas) return;
    // Match canvas internal resolution to its CSS display size for crisp lines.
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#0a0a0c';
    sigCtx = ctx;
    sigDrawing = false;
    sigLastPoint = null;
    // If state.signatureDataUrl already exists (re-render in same step), redraw.
    if (state.signatureDataUrl) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
      img.src = state.signatureDataUrl;
    }
    function pointFromEvent(e) {
      const r = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: t.clientX - r.left, y: t.clientY - r.top };
    }
    function start(e) {
      e.preventDefault();
      sigDrawing = true;
      sigLastPoint = pointFromEvent(e);
    }
    function move(e) {
      if (!sigDrawing) return;
      e.preventDefault();
      const p = pointFromEvent(e);
      ctx.beginPath();
      ctx.moveTo(sigLastPoint.x, sigLastPoint.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      sigLastPoint = p;
      if (!state.signatureHasInk) {
        state.signatureHasInk = true;
        updateConfirmButton();
      }
    }
    function end() {
      if (!sigDrawing) return;
      sigDrawing = false;
      sigLastPoint = null;
      state.signatureDataUrl = canvas.toDataURL('image/png');
    }
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);
  }
  function clearSignaturePad() {
    const canvas = document.getElementById('wcs-sig-canvas');
    if (!canvas || !sigCtx) return;
    sigCtx.clearRect(0, 0, canvas.width, canvas.height);
    state.signatureDataUrl = null;
    state.signatureHasInk = false;
    updateConfirmButton();
  }
  function updateConfirmButton() {
    const btn = root.querySelector('[data-action="confirm-membership"]');
    if (!btn) return;
    const canSubmit = state.signatureHasInk && state.typedSignature.trim().length >= 2 && state.agreementAcknowledged && !state.submittingAgreement;
    btn.disabled = !canSubmit;
  }

  function renderPlanItem(plan, selected) {
    // Carbon-style plan card: black header bar with plan name in white,
    // big monthly price hero ("$55" / "Per Month" / "$40 ENROLLMENT"),
    // hairline-separated centered feature rows with outline-circle checks,
    // and a per-card red "SIGN UP NOW" CTA that selects AND advances.
    const featuresHtml = (plan.features || [])
      .map(f => `<li><svg class="wcs-plan-check" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="9"/><polyline points="6 10 9 13 14 7"/></svg><span>${escapeHtml(f)}</span></li>`)
      .join('');
    // Split monthly amount into integer + decimal so we can render "$55"
    // big with a tiny .00 (or hide the decimal entirely if it's whole).
    const monthly = Number(plan.monthly_amount) || 0;
    const monthlyWhole = Math.floor(monthly);
    const monthlyCents = Math.round((monthly - monthlyWhole) * 100);
    return `
      <div class="wcs-plan-card ${selected ? 'is-selected' : ''}">
        <div class="wcs-plan-card-header">
          ${escapeHtml(plan.plan_label)}
          ${plan.badge ? `<span class="wcs-plan-badge">${escapeHtml(plan.badge)}</span>` : ''}

            <div class="wcs-plan-hero-period">Per Month</div>

  }

  function renderStep5() {
    if (!state.paypageUrl) {
      return `
        <div class="wcs-loading-block">
          <span class="wcs-spinner"></span>
          <p>Preparing secure payment…</p>
        </div>
      `;
    }
    const trust = state.config.copy?.step_5_trust_text ||
      'Your payment is securely processed by ABC Fitness. Card details never touch our servers.';
    return `
      <iframe class="wcs-paypage-frame" src="${escapeHtml(state.paypageUrl)}" title="Secure payment form" allow="payment" referrerpolicy="strict-origin"></iframe>
      <div class="wcs-trust">${ICONS.lock}<span>${escapeHtml(trust)}</span></div>
    `;
  }

  // Step 6 — Review & Sign. PayPage has fired and stored the transactionId
  // on state; here we show what's due today, the full ABC agreement text,
  // and a signature pad. The Confirm Membership button on this step is
  // what actually calls /submit (which creates the ABC agreement and
  // uploads the signed PDF).
  function renderStep6() {
    const plan = state.selectedPlan || {};
    // CC/ACH variant: if the member picked ACH AND this plan has an ACH
    // variant configured, show the ACH amounts. Otherwise show CC amounts.
    // The server resolves the same way at /submit time, so the displayed
    // prices always match what's actually billed.
    const usesAch = state.paymentMethodChoice === 'ach' && plan.has_ach_variant;
    const todayAmt = usesAch && plan.today_amount_ach != null ? plan.today_amount_ach : plan.today_amount;
    const monthlyAmt = usesAch && plan.monthly_amount_ach != null ? plan.monthly_amount_ach : plan.monthly_amount;
    const today = money(todayAmt);
    const monthly = money(monthlyAmt);
    const loc = state.config?.location?.display_name || '';
    const memberName = `${state.contact.first_name || ''} ${state.contact.last_name || ''}`.trim();
    const canSubmit = state.signatureHasInk && state.typedSignature.trim().length >= 2 && state.agreementAcknowledged && !state.submittingAgreement;
    return `
      <div class="wcs-section">
        <div class="wcs-due-breakdown">
          ${plan.enrollment_fee != null && plan.enrollment_fee > 0
            ? `<div class="wcs-due-line"><span>Enrollment Fee</span><b>${money(plan.enrollment_fee)}</b></div>`
            : ''}
          <div class="wcs-due-line"><span>Monthly Dues</span><b>${monthly}</b></div>
          <div class="wcs-due-line is-total"><span>Total Due Today</span><b>${today}</b></div>
        </div>
        <p class="wcs-due-note">
          ${escapeHtml(plan.plan_label || 'Membership')}${loc ? ' · ' + escapeHtml(loc) : ''}
        </p>
      </div>

      <div class="wcs-section">
        <div class="wcs-section-label">Membership Agreement</div>
        <div class="wcs-agreement-scroll" id="wcs-agreement-scroll">
          ${getAgreementBodyHtml()}
        </div>
      </div>

      <div class="wcs-section">
        <div class="wcs-section-label">Signature</div>
        <div class="wcs-sig-pad-wrap">
          <canvas id="wcs-sig-canvas" class="wcs-sig-canvas" width="600" height="180" aria-label="Sign here"></canvas>
          <button type="button" class="wcs-sig-clear" data-action="clear-signature">Clear</button>
        </div>
        <div class="wcs-field" style="margin-top: 12px;">
          <label for="wcs-typed-sig">Type your full legal name</label>
          <input id="wcs-typed-sig" type="text" name="typed_signature"
                 value="${escapeHtml(state.typedSignature || '')}"
                 autocomplete="off"
                 data-action="type-signature"
                 placeholder="${escapeHtml(memberName || 'Your full legal name')}" />
        </div>
        <label class="wcs-checkbox" style="margin-top: 8px;">
          <input type="checkbox" data-action="toggle-acknowledge"
                 ${state.agreementAcknowledged ? 'checked' : ''}
                 ${state.agreementScrolledToBottom ? '' : 'disabled'} />
          <span>I have read, understand, and agree to the terms above, and authorize the recurring billing described in this agreement.</span>
        </label>
        <div class="wcs-scroll-hint" ${state.agreementScrolledToBottom ? 'style="display:none;"' : ''}>
          Please scroll to the bottom of the agreement above to enable this checkbox.
        </div>
      </div>

      <button class="wcs-btn wcs-btn-primary wcs-btn-cta" data-action="confirm-membership"
              ${canSubmit ? '' : 'disabled'} style="margin-top: 12px;">
        ${state.submittingAgreement
          ? '<span class="wcs-spinner" style="margin-right:8px;"></span>Activating Membership…'
          : 'Confirm Membership'}
      </button>
    `;
  }

  function renderStep7() {
    if (state.successData?.pending) {
      return `
        <div class="wcs-loading-block">
          <span class="wcs-spinner"></span>
          <p>Activating your membership…</p>
        </div>
      `;
    }
    if (state.successData?.error) {
      const phone = state.config.location.phone || state.config.copy?.support_phone || 'us';
      return `
        <div class="wcs-alert wcs-alert-error">${escapeHtml(state.successData.error)}</div>
        <p>Please call ${escapeHtml(phone)} — we'll get you sorted.</p>
      `;
    }
    const s = state.successData;
    const heading = state.config.copy?.step_7_welcome_heading
      || state.config.copy?.step_6_welcome_heading
      || 'Welcome to the Westside.';
    const body = state.config.copy?.step_7_welcome_body
      || state.config.copy?.step_6_welcome_body
      || "We're happy you're here. Your membership is active — book your free Day One session below to meet your trainer and tour the gym.";
    const hasBreakdown = s.today_amount != null || s.monthly_amount != null || s.enrollment_fee != null;
    return `
      <div class="wcs-success">
        <div class="wcs-checkmark">${ICONS.check}</div>
        <h1>${escapeHtml(heading)}</h1>
        <p style="margin-top: 8px;">${escapeHtml(body)}</p>
        ${s.member_id ? `<div class="wcs-member-id">Member # ${escapeHtml(s.member_id)}</div>` : ''}
        ${s.plan_label ? `<p class="wcs-success-plan">${escapeHtml(s.plan_label)}</p>` : ''}
        ${hasBreakdown ? `
          <div class="wcs-due-breakdown wcs-due-breakdown--success">
            ${s.enrollment_fee != null && s.enrollment_fee > 0
              ? `<div class="wcs-due-line"><span>Enrollment Fee</span><b>${money(s.enrollment_fee)}</b></div>`
              : ''}
            ${s.monthly_amount != null
              ? `<div class="wcs-due-line"><span>Monthly Dues</span><b>${money(s.monthly_amount)}</b></div>`
              : ''}
            ${s.today_amount != null
              ? `<div class="wcs-due-line is-total"><span>Charged Today</span><b>${money(s.today_amount)}</b></div>`
              : ''}
          </div>
        ` : ''}
        ${s.day_one_booking_url
          ? `<a class="wcs-btn wcs-btn-primary wcs-btn-cta" href="${escapeHtml(s.day_one_booking_url)}" target="_blank" rel="noopener" style="margin-top: 16px;">Book your Day One →</a>`
          : ''}
      </div>
    `;
  }

  function renderFooter() {
    const onConfirm = state.currentStep === 7 && state.successData && !state.successData.pending;
    if (onConfirm) {
      return ''; // no footer on success/error confirm view
    }

    let primary = '';
    let primaryDisabled = false;
    switch (state.currentStep) {
      case 1: primary = ''; break; // location cards are themselves the action
      case 2: primary = ''; break; // per-card Sign Up Now is the action
      case 3: primary = `<button class="wcs-btn wcs-btn-primary wcs-btn-cta" data-action="advance-to-4">Continue →</button>`; break;
      case 4: primaryDisabled = !state.paymentMethodChoice;
              primary = `<button class="wcs-btn wcs-btn-primary wcs-btn-cta" data-action="advance-to-5" ${primaryDisabled ? 'disabled' : ''}>Continue to payment →</button>`; break;
      case 5: primary = ''; break;
      case 6: primary = ''; break; // confirm button lives inside step 6 body
    }

    const secondary = state.currentStep > 1 && state.currentStep < 7
      ? `<button class="wcs-btn wcs-btn-secondary" data-action="back">← Back</button>`
      : `<span></span>`;

    if (state.currentStep === 1) return '';
    return `<div class="wcs-panel-footer">${secondary}${primary || '<span></span>'}</div>`;
  }

  // WCS badge — rendered inline with the step-1 panel header by
  // renderPanelHeader. Host pages can override the URL via
  // data-logo-url="..." on the host element.
  const DEFAULT_LOGO_URL = 'https://westcoaststrength.com/wp-content/uploads/2023/02/Untitled-design-26-1024x1024.png';

  function render() {
    const bodyFn = ({ 1: renderStep1, 2: renderStep2, 3: renderStep3, 4: renderStep4, 5: renderStep5, 6: renderStep6, 7: renderStep7 }[state.currentStep]) || renderStep1;
    const flash = state.flashMessage
      ? `<div class="wcs-alert ${state.flashMessage.type === 'error' ? 'wcs-alert-error' : 'wcs-alert-info'}">${escapeHtml(state.flashMessage.text)}</div>`
      : '';
    root.innerHTML = `
      <div class="wcs-container">
        <div class="wcs-panel">
          ${renderPanelHeader()}
          <div class="wcs-panel-body">
            ${flash}
            ${bodyFn()}
          </div>
          ${renderFooter()}
        </div>
      </div>
    `;
    state.flashMessage = null;
    attachListeners();
    if (state.currentStep === 6) {
      initSignaturePad();
      initAgreementScrollGate();
    }
  }

  // ----- Events -----------------------------------------------------------
  function flash(type, text) { state.flashMessage = { type, text }; }
  function attachListeners() {
    root.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', (e) => handleAction(el.dataset.action, el, e));
    });
    root.querySelectorAll('input, select, textarea').forEach(el => {
      el.addEventListener('input', handleInputChange);
      el.addEventListener('change', handleInputChange);
    });
  }
  function handleInputChange(e) {
    const el = e.target;
    // Step 6 acknowledge checkbox doesn't carry a `name` — match on data-action.
    if (el.type === 'checkbox' && el.dataset?.action === 'toggle-acknowledge') {
      state.agreementAcknowledged = el.checked;
      updateConfirmButton();
      return;
    }
    const name = el.name;
    // Step 6 typed-signature input.
    if (name === 'typed_signature') {
      state.typedSignature = el.value;
      updateConfirmButton();
      return;
    }
    if (!name) return;
    if (el.type === 'checkbox') {
      if (name === 'marketing_email') state.marketing.email = el.checked;
      else if (name === 'marketing_sms') state.marketing.sms = el.checked;
      else if (name === 'terms') state.termsAccepted = el.checked;
    } else if (name.startsWith('ec_')) {
      const k = name.slice(3);
      state.emergencyContact[k] = name.endsWith('phone') ? formatPhoneInput(el.value) : el.value;
      if (name.endsWith('phone')) el.value = state.emergencyContact[k];
    } else if (name in state.contact) {
      let v = el.value;
      if (name === 'cell_phone') { v = formatPhoneInput(v); el.value = v; }
      else if (name === 'birthday') { v = formatBirthdayInput(v); el.value = v; }
      else if (name === 'state') v = v.toUpperCase().slice(0, 2);
      state.contact[name] = v;
    }
    saveState();
  }
  async function handleAction(action, el) {
    if (action === 'back') return goto(state.currentStep - 1);
    if (action === 'choose-location') {
      const slug = el.dataset.slug;
      if (!slug) return;
      // If they pick the same location they already loaded, just advance.
      if (state.currentLocationId === slug && state.config) return goto(2);
      try {
        state.locationLoading = true;
        state.currentLocationId = slug;
        // Re-hydrate per-location draft state if there's any.
        applyStoredStateFor(slug);
        render();
        const cfg = await fetchConfig(slug);
        state.config = cfg;
        state.locationLoading = false;
        saveState();
        goto(2);
      } catch (err) {
        state.locationLoading = false;
        state.currentLocationId = null;
        state.config = null;
        flash('error', err.message || 'Could not load that location.');
        render();
      }
      return;
    }
    if (action === 'advance-to-2') return goto(2);
    if (action === 'advance-to-3') return goto(3);
    if (action === 'select-plan') {
      const plan = state.config.plans.find(p => p.id === el.dataset.planId);
      if (plan) { state.selectedPlan = plan; render(); saveState(); }
      return;
    }
    if (action === 'signup-plan') {
      // Per-card "Sign Up Now" — pick the plan and advance to step 3 in
      // one tap. No eligibility check yet (that happens on the step 3
      // -> step 4 transition where we have the member's birthday).
      const plan = state.config.plans.find(p => p.id === el.dataset.planId);
      if (plan) {
        state.selectedPlan = plan;
        saveState();
        goto(3);
      }
      return;
    }
    if (action === 'select-pm') {
      state.paymentMethodChoice = el.dataset.pm;
      render(); saveState();
      return;
    }
    if (action === 'advance-to-4') {
      const errors = clientValidateContact();
      state.inlineErrors = errors;
      if (Object.keys(errors).length) { render(); return; }
      try {
        el.disabled = true;
        const elig = await checkEligibility(state.selectedPlan.id, birthdayToIso(state.contact.birthday));
        if (!elig.ok) { flash('error', elig.body?.error || 'Eligibility check failed.'); render(); return; }
        if (elig.body.eligible === false) { handleIneligible(elig.body); return; }
        goto(4);
      } finally { el.disabled = false; }
      return;
    }
    if (action === 'advance-to-5') {
      try {
        el.disabled = true;
        flash('info', 'Setting up secure payment…');
        render();
        const r = await startSignup();
        if (!r.ok) {
          flash('error', (r.body?.errors || []).join(' ') || r.body?.error || `Failed to start (${r.status})`);
          state.currentStep = 4;
          render(); return;
        }
        state.signupId = r.body.signup_id;
        state.paypageUrl = r.body.paypage_url;
        saveState();
        goto(5);
      } finally {}
      return;
    }
    if (action === 'clear-signature') {
      clearSignaturePad();
      return;
    }
    if (action === 'confirm-membership') {
      return confirmMembership();
    }
    if (action === 'switch-plan') {
      const plan = state.config.plans.find(p => p.id === el.dataset.planId);
      if (plan) {
        state.selectedPlan = plan;
        state.inlineErrors = {};
        saveState();
        const elig = await checkEligibility(plan.id, birthdayToIso(state.contact.birthday));
        if (elig.body?.eligible === false) handleIneligible(elig.body);
        else { flash('info', `Switched to ${plan.plan_label}.`); render(); }
      }
      return;
    }
    if (action === 'back-to-plans') return goto(2);
  }

  function handleIneligible(elig) {
    const suggested = (elig.suggested_plans || []).map(p => `
      <div class="wcs-plan-card" data-action="switch-plan" data-plan-id="${p.id}">
        <div class="wcs-plan-row">
          <span class="wcs-plan-name">${escapeHtml(p.plan_label)}</span>
          <div class="wcs-plan-prices">
            <div><b>${money(p.today_amount)}</b>today</div>
            <div>then <b style="font-size:11px;">${money(p.monthly_amount)}</b>/mo</div>
          </div>
        </div>
      </div>
    `).join('');
    const phone = state.config.location.phone || state.config.copy?.support_phone || '';
    root.innerHTML = `
      <div class="wcs-panel">
        <div class="wcs-panel-header">
          <div>
            <div class="wcs-eyebrow">Different plan needed</div>
            <h1>This plan isn't quite right</h1>
          </div>
          <span class="wcs-progress-pill">Step 3 / ${TOTAL_STEPS}</span>
        </div>
        <div class="wcs-panel-progress"><div class="wcs-panel-progress-fill" style="width: ${(3/TOTAL_STEPS)*100}%;"></div></div>
        <div class="wcs-panel-body">
          <div class="wcs-alert wcs-alert-info">${escapeHtml(elig.ineligible_message || 'Please choose a different plan.')}</div>
          ${suggested ? `<div class="wcs-section-label">Plans that fit you</div><div class="wcs-plan-list">${suggested}</div>`
                      : `<p>No other plans fit online. Please call ${escapeHtml(phone || 'us')} and we'll find the right fit.</p>`}
        </div>
        <div class="wcs-panel-footer">
          <button class="wcs-btn wcs-btn-secondary" data-action="back-to-plans">← Back to plans</button>
          <span></span>
        </div>
      </div>
    `;
    attachListeners();
  }

  function goto(step) {
    if (step < 1) step = 1;
    state.currentStep = step;
    state.inlineErrors = {};
    saveState();
    render();
    scrollWidgetToTop();
  }

  // Scroll the widget back to the top whenever the step changes — without
  // this, picking a location near the bottom of the step-1 list on mobile
  // leaves the viewport scrolled past the new step's content. Tries
  // scrollIntoView first (works inside an iframe-embedded WP page) and
  // falls back to window.scrollTo for the standalone widget URL.
  function scrollWidgetToTop() {
    try {
      if (root && typeof root.scrollIntoView === 'function') {
        root.scrollIntoView({ behavior: 'auto', block: 'start' });
      }
    } catch (_) {}
    try { window.scrollTo(0, 0); } catch (_) {}
  }

  // ----- PayPage postMessage ----------------------------------------------
  function extractTransaction(data) {
    if (!data) return null;
    if (typeof data === 'string') { try { data = JSON.parse(data); } catch (_) { return null; } }
    if (typeof data !== 'object') return null;
    const id = data.transactionId || data.payPageTransactionId
      || data.tokenId || data.token || data.paypageTransactionId || null;
    const type = (data.paymentType || data.payment_type || '').toLowerCase();
    let paymentType = state.paymentMethodChoice === 'ach' ? 'Bank Account' : 'Credit Card';
    if (type.includes('bank') || type.includes('ach') || type.includes('eft')) paymentType = 'Bank Account';
    else if (type.includes('card') || type.includes('credit')) paymentType = 'Credit Card';
    return id ? { id, paymentType } : null;
  }
  window.addEventListener('message', async (event) => {
    if (event.origin !== PAYPAGE_ORIGIN) return;
    if (state.currentStep < 5) return;
    const tx = extractTransaction(event.data);
    if (!tx) return;
    // Payment method tokenized successfully. Don't call /submit yet — that
    // happens only after the member signs in step 6. Stash the transaction
    // ID and advance.
    state.paypageTransactionId = tx.id;
    state.paypagePaymentType = tx.paymentType;
    state.currentStep = 6;
    // Reset the scroll-to-bottom gate every time we land on step 6.
    state.agreementScrolledToBottom = false;
    state.agreementAcknowledged = false;
    saveState();
    render();
    scrollWidgetToTop();
  });

  async function confirmMembership() {
    if (state.submittingAgreement) return;
    if (!state.paypageTransactionId) {
      state.flashMessage = { type: 'error', text: 'Payment session expired. Please reload and try again.' };
      render();
      return;
    }
    state.submittingAgreement = true;
    state.successData = { pending: true };
    render();
    const r = await api('/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        signup_id: state.signupId,
        paypage_transaction_id: state.paypageTransactionId,
        paypage_payment_type: state.paypagePaymentType,
        signature_data_url: state.signatureDataUrl,
        typed_signature: state.typedSignature,
        agreement_acknowledged: state.agreementAcknowledged,
      }),
    });
    state.submittingAgreement = false;
    if (r.ok && r.body?.success) {
      state.successData = r.body;
      state.currentStep = 7;
      clearStoredState();
      render();
      scrollWidgetToTop();
    } else {
      state.successData = { error: r.body?.error || 'We could not finalize your membership. Our team has been notified.' };
      state.currentStep = 7;
      render();
      scrollWidgetToTop();
    }
  }

  // ----- Boot --------------------------------------------------------------
  function applyStoredStateFor(slug) {
    const stored = loadStoredStateFor(slug);
    // Reset per-location fields to defaults first so previous picks don't bleed.
    Object.assign(state.contact, {
      first_name: '', last_name: '', email: '', cell_phone: '',
      birthday: '', gender: '',
      address_line1: '', address_line2: '', city: '', state: 'OR', zip_code: '',
    });
    Object.assign(state.emergencyContact, { first_name: '', last_name: '', phone: '' });
    state.marketing = { email: true, sms: true };
    state.termsAccepted = false;
    state.paymentMethodChoice = null;
    state.signupId = null;
    state.paypageUrl = null;
    state.selectedPlan = null;
    if (!stored) return;
    if (stored.contact) Object.assign(state.contact, stored.contact);
    if (stored.emergencyContact) Object.assign(state.emergencyContact, stored.emergencyContact);
    if (stored.marketing) Object.assign(state.marketing, stored.marketing);
    state.termsAccepted = !!stored.termsAccepted;
    state.paymentMethodChoice = stored.paymentMethodChoice || null;
    state.signupId = stored.signupId || null;
    state.paypageUrl = stored.paypageUrl || null;
    if (stored.selectedPlanId && state.config?.plans) {
      state.selectedPlan = state.config.plans.find(p => p.id === stored.selectedPlanId) || null;
    }
    state.currentStep = Math.min(stored.currentStep || 1, 4);
  }

  async function init() {
    // Load list of locations first (always needed for the step-1 picker).
    try {
      state.locations = await fetchLocations();
    } catch (err) {
      state.locationsError = err.message;
      render();
      return;
    }

    // If the host pre-set a default location (or we have one stored from a
    // previous session) auto-load that config so the user can resume.
    const stored = loadStoredGlobal();
    const resumeSlug = (stored?.currentLocationId) || DEFAULT_LOCATION_ID;
    const exists = resumeSlug && state.locations.some(l => l.wcs_location_id === resumeSlug);
    if (exists) {
      state.currentLocationId = resumeSlug;
      applyStoredStateFor(resumeSlug);
      try {
        state.config = await fetchConfig(resumeSlug);
        // If they had progress beyond step 1, drop them back at step 2 minimum
        // so they see the picked location's plans. Don't auto-resume into
        // PayPage step 5 since it's session-bound.
        if (state.currentStep < 2) state.currentStep = 1; // stay on chooser
        render();
        return;
      } catch (_) {
        // Fall through to chooser
        state.currentLocationId = null;
        state.config = null;
      }
    }

    state.currentStep = 1;
    render();
  }
  init();
})();
</script>
