      const isLoading = state.locationLoading && state.currentLocationId === loc.wcs_location_id;
      const addressLine = [loc.address_line1, loc.city].filter(Boolean).join(', ');
      const cityState = [loc.city, loc.state, loc.zip].filter(Boolean).join(' ');
      return `
        <button class="wcs-loc-card ${isDefault ? 'is-default' : ''} ${isLoading ? 'is-loading' : ''}"
                data-action="choose-location" data-slug="${escapeHtml(loc.wcs_location_id)}"
                type="button">
          ${isDefault ? '<span class="wcs-loc-tag">Suggested</span>' : ''}
          <div class="wcs-loc-name">${escapeHtml(loc.display_name)}</div>
          <div class="wcs-loc-meta">
            ${loc.address_line1 ? `<div>${escapeHtml(loc.address_line1)}</div>` : ''}
            ${cityState ? `<div>${escapeHtml(cityState)}</div>` : ''}
            ${loc.phone ? `<div>${escapeHtml(loc.phone)}</div>` : ''}
            ${loc.hours_summary ? `<div style="margin-top:4px; font-style: italic;">${escapeHtml(loc.hours_summary)}</div>` : ''}
          </div>
        </button>
      `;
    }).join('');
    return `
      <p style="margin-bottom: 12px;">Choose the West Coast Strength location you'd like to join.</p>
      <div class="wcs-loc-list">${cards}</div>
    `;
  }

  // ----- Type / term helpers ---------------------------------------------
  function termLabel(t) {
    return t === '1yr' ? '1-Year' : t === 'm2m' ? 'Month-to-Month' : (t || 'Membership');
  }
  // Pricing helpers. The "standard" price is the card price; the ACH price is
  // presented to the member as a discount — we never label prices "card"/"bank".
  function numOrNull(v) { const n = Number(v); return Number.isFinite(n) ? n : null; }
  // Monthly dues are a property of the membership (same across terms in WCS's
  // model — the term only changes the enrollment fee). Use the lowest configured
  // monthly so the headline never overstates the price.
  function typePricing(type) {
    const ccs = (type.terms || []).map(t => numOrNull(t?.cc?.monthly)).filter(v => v != null);
    const achs = (type.terms || []).filter(t => t.has_ach_variant)
      .map(t => numOrNull(t?.ach?.monthly)).filter(v => v != null);
    return {
      standard: ccs.length ? Math.min(...ccs) : null,
      ach: achs.length ? Math.min(...achs) : null,
    };
  }
  function heroAmountHtml(amount) {
    const whole = Math.floor(amount);
    const cents = Math.round((amount - whole) * 100);
    return `<div class="wcs-plan-hero-amount"><span class="wcs-plan-hero-cur">$</span><span class="wcs-plan-hero-num">${whole}${cents ? `<small style="font-size:0.5em;letter-spacing:0;">.${String(cents).padStart(2,'0')}</small>` : ''}</span></div>`;
  }
  // Shape a config term (under a type) into the plan-like object the rest of
  // the flow expects (pay step, review step, /start payload all read these).
  function planFromTerm(type, term) {
    return {
      id: term.plan_id,
      plan_label: `${type.type_label} · ${termLabel(term.term)}`,
      term: term.term,
      has_ach_variant: !!term.has_ach_variant,
      enrollment_fee: term.enrollment_fee,
      today_amount: term.cc?.today,
      monthly_amount: term.cc?.monthly,
      today_amount_ach: term.ach ? term.ach.today : null,
      monthly_amount_ach: term.ach ? term.ach.monthly : null,
    };
  }
  function findTermByPlanId(planId) {
    for (const type of (state.config?.types || [])) {
      for (const term of (type.terms || [])) {
        if (term.plan_id === planId) return { type, term };
      }
    }
    return null;
  }

  // ----- Family / household helpers --------------------------------------
  function isFamilyType() {
    return !!state.selectedType?.allow_secondary_members;
  }
  // Tiers for the selected term, sorted ascending by capacity. Falls back to a
  // single synthetic tier from the term's base fields if `tiers` is absent.
  function currentTiers() {
    const t = state.selectedTerm;
    if (!t) return [];
    if (Array.isArray(t.tiers) && t.tiers.length) return t.tiers;
    return [{
      plan_id: t.plan_id, max_members: t.max_members || 1,
      enrollment_fee: t.enrollment_fee, cc: t.cc, ach: t.ach, has_ach_variant: t.has_ach_variant,
    }];
  }
  function maxSecondaries() {
    const tiers = currentTiers();
    if (!tiers.length) return 0;
    return Math.max(0, Math.max(...tiers.map(t => t.max_members || 1)) - 1);
  }
  // Smallest tier whose capacity covers the household (primary + secondaries).
  function resolveTier() {
    const tiers = currentTiers();
    if (!tiers.length) return null;
    const total = 1 + state.secondaryMembers.length;
    return tiers.find(t => (t.max_members || 1) >= total) || tiers[tiers.length - 1];
  }
  function planFromTier(type, term, tier) {
    return {
      id: tier.plan_id,
      plan_label: `${type.type_label} · ${termLabel(term.term)}`,
      term: term.term,
      has_ach_variant: !!tier.has_ach_variant,
      enrollment_fee: tier.enrollment_fee,
      today_amount: tier.cc?.today,
      monthly_amount: tier.cc?.monthly,
      today_amount_ach: tier.ach ? tier.ach.today : null,
      monthly_amount_ach: tier.ach ? tier.ach.monthly : null,
    };
  }
  // Re-point selectedPlan at the size-matched tier for the current household.
  function syncSelectedPlanToHousehold() {
    if (!state.selectedType || !state.selectedTerm) return;
    const tier = resolveTier();
    if (tier) state.selectedPlan = planFromTier(state.selectedType, state.selectedTerm, tier);
  }
  // Non-family flows hide the household step, so pills/labels read "x / 8".
  function displayTotal() { return isFamilyType() ? 9 : 8; }
  function displayStep() {
    if (isFamilyType()) return state.currentStep;
    return state.currentStep <= 4 ? state.currentStep : state.currentStep - 1;
  }

  // Step 2 — membership type cards (brochure style): a price hero (standard
  // monthly + ACH discount) and left-aligned amenities, then drills into the
  // term step where the enrollment fee differs.
  function renderTypeCard(type) {
    const featuresHtml = (type.features || [])
      .map(f => `<li><svg class="wcs-plan-check" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="9"/><polyline points="6 10 9 13 14 7"/></svg><span>${escapeHtml(f)}</span></li>`)
      .join('');
    const { standard, ach } = typePricing(type);
    const heroHtml = standard != null ? `
      <div class="wcs-plan-hero">
        ${heroAmountHtml(standard)}
        <div class="wcs-plan-hero-period">Per Month</div>
        ${ach != null && ach < standard
          ? `<div class="wcs-ach-discount">ACH discount — ${money(ach)}/mo <span>(save ${money(standard - ach)}/mo)</span></div>`
          : ''}
      </div>` : '';
    return `
      <div class="wcs-plan-card">
        <div class="wcs-plan-card-header">
          ${escapeHtml(type.type_label)}
          ${type.is_promo ? '<span class="wcs-limited-badge">Limited Time</span>' : ''}
          ${type.badge ? `<span class="wcs-plan-badge">${escapeHtml(type.badge)}</span>` : ''}
        </div>
        <div class="wcs-plan-card-body">
          ${heroHtml}
          ${type.description ? `<div class="wcs-plan-description">${escapeHtml(type.description)}</div>` : ''}
          ${featuresHtml ? `<div class="wcs-plan-features-header">What's Included</div><ul>${featuresHtml}</ul>` : ''}
          <button class="wcs-plan-card-cta" data-action="choose-type" data-type-id="${escapeHtml(type.id)}">Select →</button>
        </div>
      </div>
    `;
  }

  function renderStep2() {
    const types = state.config.types || [];
    if (types.length === 0) {
      return `<div class="wcs-alert wcs-alert-info">No memberships are available online yet. Please call ${escapeHtml(state.config.location.phone || 'us')} to enroll.</div>`;
    }
    return `<div class="wcs-plan-list">${types.map(renderTypeCard).join('')}</div>`;
  }

  // Step 3 — side-by-side term comparison (Month-to-Month vs 1-Year). Monthly
  // dues are identical across terms (shown on the type screen); the only
  // difference is the enrollment fee, so that's the focus here.
  function renderTermCard(type, term) {
    const enroll = Number(term.enrollment_fee);
    const hasEnroll = Number.isFinite(enroll) && enroll > 0;
    const monthly = Number(term?.cc?.monthly);
    const ach = term.has_ach_variant && Number.isFinite(Number(term?.ach?.monthly)) ? Number(term.ach.monthly) : null;
    const monthlyNote = Number.isFinite(monthly)
      ? `then ${money(monthly)}/mo${ach != null ? ` <span class="wcs-tpr-bank">· ${money(ach)}/mo ACH</span>` : ''}`
      : '';
    return `
      <div class="wcs-plan-card">
        <div class="wcs-plan-card-header">${escapeHtml(termLabel(term.term))}</div>
        <div class="wcs-plan-card-body">
          <div class="wcs-term-enroll-hero ${hasEnroll ? '' : 'is-none'}">${hasEnroll ? money(enroll) : '$0'}</div>
          <div class="wcs-term-enroll-label">${hasEnroll ? 'Enrollment Fee' : 'No Enrollment Fee'}</div>
          ${monthlyNote ? `<div class="wcs-term-monthly-note">${monthlyNote}</div>` : ''}
          <button class="wcs-plan-card-cta" data-action="choose-term" data-plan-id="${escapeHtml(term.plan_id)}" style="margin-top:18px;">Continue →</button>
        </div>
      </div>
    `;
  }

  function renderStep3() {
    const type = state.selectedType;
    if (!type) return `<div class="wcs-alert wcs-alert-info">Please choose a membership first.</div>`;
    const terms = type.terms || [];
    if (terms.length === 0) {
      return `<div class="wcs-alert wcs-alert-info">No terms available for this membership. Please call ${escapeHtml(state.config.location.phone || 'us')}.</div>`;
    }
    const cxLabel = state.config.copy?.cancellation_rules_label || 'Cancellation policy';
    const hasCx = !!(state.config.copy?.cancellation_rules_body || '').trim();
    return `
      <p style="margin-bottom: 12px;">Choose your commitment for the <b>${escapeHtml(type.type_label)}</b> membership. Same monthly dues — the only difference is the enrollment fee.</p>
      <div class="wcs-plan-list">${terms.map(t => renderTermCard(type, t)).join('')}</div>
      ${hasCx ? `<p class="wcs-cancellation-note"><a href="#" data-action="show-cancellation">${escapeHtml(cxLabel)}</a></p>` : ''}
    `;
  }

  // Cancellation-rules modal — text is admin-editable via the online_join_copy
  // keys cancellation_rules_label / cancellation_rules_body.
  function renderCancellationModal() {
    if (!state.showCancellation) return '';
    const title = state.config?.copy?.cancellation_rules_label || 'Cancellation Policy';
    const body = state.config?.copy?.cancellation_rules_body || '';
    return `
      <div class="wcs-modal-overlay" data-action="hide-cancellation">
        <div class="wcs-modal">
          <div class="wcs-modal-head">
            <h3>${escapeHtml(title)}</h3>
            <button class="wcs-modal-close" data-action="hide-cancellation" aria-label="Close">&times;</button>
          </div>
          <div class="wcs-modal-body">${escapeHtml(body).replace(/\n/g, '<br>')}</div>
        </div>
      </div>
    `;
  }

  function fieldHtml({ name, label, type = 'text', value, placeholder, autocomplete, max, error, full }) {
    return `
      <div class="wcs-field" ${full ? 'style="grid-column: 1 / -1;"' : ''}>
        <label for="wcs-f-${name}">${escapeHtml(label)}</label>
        <input id="wcs-f-${name}" type="${type}" name="${name}" value="${escapeHtml(value || '')}"
               ${placeholder ? `placeholder="${escapeHtml(placeholder)}"` : ''}
               ${autocomplete ? `autocomplete="${autocomplete}"` : ''}
               ${max ? `maxlength="${max}"` : ''}
               class="${error ? 'is-error' : ''}" />
        ${error ? `<div class="wcs-field-error">${escapeHtml(error)}</div>` : ''}
      </div>
    `;
  }

  function renderStep4() {
    const c = state.contact;
    const ec = state.emergencyContact;
    const err = state.inlineErrors;
    return `
      <div class="wcs-section">
        <div class="wcs-section-label">Contact</div>
        <div class="wcs-row">
          ${fieldHtml({ name: 'first_name', label: 'First name', value: c.first_name, autocomplete: 'given-name', placeholder: 'Jane', error: err.first_name })}
          ${fieldHtml({ name: 'last_name', label: 'Last name', value: c.last_name, autocomplete: 'family-name', placeholder: 'Doe', error: err.last_name })}
        </div>
        <div class="wcs-row">
          ${fieldHtml({ name: 'email', label: 'Email', type: 'email', value: c.email, autocomplete: 'email', placeholder: 'jane@email.com', error: err.email })}
          ${fieldHtml({ name: 'cell_phone', label: 'Cell phone', type: 'tel', value: c.cell_phone, autocomplete: 'tel-national', placeholder: '(555) 555-5555', error: err.cell_phone })}
        </div>
        <div class="wcs-row">
          ${fieldHtml({ name: 'birthday', label: 'Date of birth', type: 'text', value: c.birthday, autocomplete: 'bday', placeholder: 'MM/DD/YYYY', max: 10, error: err.birthday })}
          <div class="wcs-field">
            <label for="wcs-f-gender">Gender</label>
            <select id="wcs-f-gender" name="gender">
              <option value="" ${!c.gender ? 'selected' : ''}>—</option>
              <option value="M" ${c.gender === 'M' ? 'selected' : ''}>Male</option>
              <option value="F" ${c.gender === 'F' ? 'selected' : ''}>Female</option>
              <option value="O" ${c.gender === 'O' ? 'selected' : ''}>Other / prefer not to say</option>
            </select>
          </div>
        </div>
      </div>
      <div class="wcs-section">
        <div class="wcs-section-label">Address</div>
        ${fieldHtml({ name: 'address_line1', label: 'Street', value: c.address_line1, autocomplete: 'address-line1', placeholder: '123 Main St', error: err.address_line1, full: true })}
        ${fieldHtml({ name: 'address_line2', label: 'Apt / suite (optional)', value: c.address_line2, autocomplete: 'address-line2', placeholder: 'Apt 4B', full: true })}
        <div class="wcs-row-3">
          ${fieldHtml({ name: 'city', label: 'City', value: c.city, autocomplete: 'address-level2', placeholder: 'Salem', error: err.city })}
          ${fieldHtml({ name: 'state', label: 'State', value: c.state, max: 2, autocomplete: 'address-level1', placeholder: 'OR', error: err.state })}
          ${fieldHtml({ name: 'zip_code', label: 'ZIP', value: c.zip_code, autocomplete: 'postal-code', placeholder: '97301', error: err.zip_code })}
        </div>
      </div>
      <div class="wcs-section">
        <div class="wcs-section-label">Emergency contact</div>
        <div class="wcs-row">
          ${fieldHtml({ name: 'ec_first_name', label: 'First name', value: ec.first_name, placeholder: 'John', error: err.ec_first_name })}
          ${fieldHtml({ name: 'ec_last_name', label: 'Last name', value: ec.last_name, placeholder: 'Doe', error: err.ec_last_name })}
        </div>
        ${fieldHtml({ name: 'ec_phone', label: 'Phone', type: 'tel', value: ec.phone, placeholder: '(555) 555-5555', error: err.ec_phone, full: true })}
      </div>
      <div class="wcs-section">
        <label class="wcs-checkbox">
          <input type="checkbox" name="terms" ${state.termsAccepted ? 'checked' : ''}>
          <span>I agree to the
            ${state.config.copy?.terms_url ? `<a href="${escapeHtml(state.config.copy.terms_url)}" target="_blank" rel="noopener">terms</a>` : 'terms'}
            and
            ${state.config.copy?.privacy_url ? `<a href="${escapeHtml(state.config.copy.privacy_url)}" target="_blank" rel="noopener">privacy policy</a>` : 'privacy policy'}.
          </span>
        </label>
        ${err.terms ? `<div class="wcs-field-error">${escapeHtml(err.terms)}</div>` : ''}
      </div>
    `;
  }

  // Step 5 — household / secondary members (family types only). Each member
  // adds name / DOB / email / phone (address inherited from the primary). The
  // monthly total auto-updates from the size-matched tier as members change.
  function renderStep5() {
    const tiers = currentTiers();                   // sorted ascending by capacity
    const baseTier = tiers[0] || null;
    const baseCap = baseTier?.max_members || 1;      // people at the base price
    const members = state.secondaryMembers;
    // Family memberships require at least (baseCap - 1) household members (e.g.
    // base covers 3 → you + 2) — pre-show those slots so nobody can pay for a
    // family plan with just themselves.
    const minSec = isFamilyType() ? Math.max(0, baseCap - 1) : 0;
    while (members.length < minSec) members.push({ first_name: '', last_name: '', birthday: '', email: '', cell_phone: '' });
    syncSelectedPlanToHousehold();
    const basePrice = Number(baseTier?.cc?.monthly);
    const includedExtra = Math.max(0, baseCap - 1);
    const maxSec = maxSecondaries();
    const err = state.inlineErrors;
    const total = 1 + members.length;
    // Monthly for a given household size (smallest tier that fits).
    const priceForCount = (c) => {
      const t = tiers.find(tt => (tt.max_members || 1) >= c) || tiers[tiers.length - 1];
      return Number(t?.cc?.monthly);
    };
    const currentPrice = priceForCount(total);
    // Per-additional rate = step from base to the first larger tier.
    const perAddTier = tiers.find(tt => (tt.max_members || 1) > baseCap);
    const perAdd = (perAddTier && Number.isFinite(basePrice)) ? Number(perAddTier.cc.monthly) - basePrice : null;

    const rows = members.map((m, i) => `
      <div class="wcs-household-member">
        <div class="wcs-household-member-head">
          <span>Member ${i + 1}</span>
          ${members.length > minSec ? `<button type="button" class="wcs-household-remove" data-action="remove-secondary" data-index="${i}">Remove</button>` : ''}
        </div>
        <div class="wcs-row">
          ${fieldHtml({ name: `sec-${i}-first_name`, label: 'First name', value: m.first_name, placeholder: 'Alex', error: err[`sec_${i}_first_name`] })}
          ${fieldHtml({ name: `sec-${i}-last_name`, label: 'Last name', value: m.last_name, placeholder: 'Doe', error: err[`sec_${i}_last_name`] })}
        </div>
        <div class="wcs-row">
          ${fieldHtml({ name: `sec-${i}-email`, label: 'Email', type: 'email', value: m.email, placeholder: 'alex@email.com', error: err[`sec_${i}_email`] })}
          ${fieldHtml({ name: `sec-${i}-cell_phone`, label: 'Cell phone', type: 'tel', value: m.cell_phone, placeholder: '(555) 555-5555', error: err[`sec_${i}_cell_phone`] })}
        </div>
        <div class="wcs-row">
          ${fieldHtml({ name: `sec-${i}-birthday`, label: 'Date of birth', value: m.birthday, placeholder: 'MM/DD/YYYY', max: 10, error: err[`sec_${i}_birthday`] })}
          <div class="wcs-field"></div>
        </div>
      </div>
    `).join('');

    const canAdd = members.length < maxSec;
    const extraCount = Math.max(0, total - baseCap);
    let breakdown = `<div class="wcs-due-line"><span>Base membership <small style="opacity:0.6;">· covers up to ${baseCap}</small></span><b>${Number.isFinite(basePrice) ? money(basePrice) + '/mo' : '—'}</b></div>`;
    for (let j = 1; j <= extraCount; j++) {
      const c = baseCap + j;
      const delta = priceForCount(c) - priceForCount(c - 1);
      breakdown += `<div class="wcs-due-line"><span>+ Household member ${baseCap + j}</span><b>+${money(delta)}/mo</b></div>`;
    }
    breakdown += `<div class="wcs-due-line is-total"><span>Monthly total</span><b>${Number.isFinite(currentPrice) ? money(currentPrice) + '/mo' : '—'}</b></div>`;
    return `
      <p style="margin-bottom: 6px;">Your membership includes <b>you${includedExtra ? ` + up to ${includedExtra} household member${includedExtra === 1 ? '' : 's'}` : ''}</b> at the base price${Number.isFinite(basePrice) ? ` of ${money(basePrice)}/mo` : ''}.${perAdd != null && perAdd > 0 ? ` Each additional member is <b>+${money(perAdd)}/mo</b>.` : ''}</p>
      ${minSec > 0 ? `<p class="wcs-household-note" style="margin-bottom: 6px;"><b>A family membership requires at least ${minSec} household member${minSec === 1 ? '' : 's'}</b> (you + ${minSec}).</p>` : ''}
      <p class="wcs-household-note" style="margin-bottom: 14px;">Household members share your address. Add their name, date of birth, email, and phone.</p>
      ${rows || '<p class="wcs-household-empty">No household members added yet.</p>'}
      ${canAdd
        ? `<button type="button" class="wcs-btn wcs-btn-secondary wcs-household-add" data-action="add-secondary">+ Add household member</button>`
        : `<p class="wcs-household-note">Maximum household size reached.</p>`}
      <div class="wcs-due-breakdown wcs-household-breakdown">${breakdown}</div>
    `;
  }

  function renderStep6() {
    const choice = state.paymentMethodChoice;
    const plan = state.selectedPlan || {};
    // ACH savings line — only shown when the chosen plan has a configured
    // ACH variant AND the ACH monthly is actually cheaper than CC.
    const ccMonthly = Number(plan.monthly_amount);
    const achMonthly = plan.monthly_amount_ach != null ? Number(plan.monthly_amount_ach) : null;
    const hasAch = plan.has_ach_variant && Number.isFinite(achMonthly);
    const hasSavings = hasAch && Number.isFinite(ccMonthly) && achMonthly < ccMonthly;
    const savings = hasSavings ? ccMonthly - achMonthly : 0;
    const savingsLabel = hasSavings
      ? `<span class="wcs-pm-savings">Save ${money(savings)}/mo</span>`
      : '';
    return `
      <p style="margin-bottom: 12px;">Pick how you'd like to be charged today and for monthly dues.${hasSavings ? ` <b>Pay by bank (ACH) and save ${money(savings)}/mo.</b>` : ''}</p>
      <div class="wcs-pm-list">
        <div class="wcs-pm-card ${choice === 'card' ? 'is-selected' : ''}" data-action="select-pm" data-pm="card">
          <div class="wcs-pm-icon">${ICONS.card}</div>
          <div class="wcs-pm-text">
            <div class="wcs-pm-name">Credit / Debit Card${Number.isFinite(ccMonthly) ? ` <span class="wcs-pm-price">${money(ccMonthly)}/mo</span>` : ''}</div>
            <div class="wcs-pm-sub">Standard price · Visa, Mastercard, AmEx, Discover</div>
          </div>
        </div>
        <div class="wcs-pm-card ${choice === 'ach' ? 'is-selected' : ''}" data-action="select-pm" data-pm="ach">
          <div class="wcs-pm-icon">${ICONS.bank}</div>
          <div class="wcs-pm-text">
            <div class="wcs-pm-name">Bank Account (ACH)${hasAch ? ` <span class="wcs-pm-price wcs-pm-price--ach">${money(achMonthly)}/mo</span>` : ''} ${savingsLabel}</div>
            <div class="wcs-pm-sub">${hasAch ? `ACH discount · draft from checking` : 'Draft from checking · lower fees'}</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderStep7() {
    // For the EFT card-today hybrid the member tokenizes two methods in two
    // passes; pick the right iframe + a clear header for the current pass.
    let url = state.paypageUrl;
    let header = '';
    if (state.hybrid) {
      if (state.hybridPhase === 'today') {
        url = state.paypageUrlToday;
        header = "Step 1 of 2 — card for today's payment";
      } else {
        url = state.paypageUrl;
        header = 'Step 2 of 2 — bank account for monthly dues';
      }
    }
    if (!url) {
      return `
        <div class="wcs-loading-block">
          <span class="wcs-spinner"></span>
          <p>Preparing secure payment…</p>
        </div>
      `;
    }
    const trust = state.config.copy?.step_5_trust_text ||
      'Your payment is securely processed by ABC Fitness. Card details never touch our servers.';
    return `
      ${header ? `<div class="wcs-pay-subhead"><span class="wcs-pay-subhead-tag">${escapeHtml(header)}</span></div>` : ''}
      <iframe class="wcs-paypage-frame" src="${escapeHtml(url)}" title="Secure payment form" allow="payment" referrerpolicy="strict-origin"></iframe>
      <div class="wcs-trust">${ICONS.lock}<span>${escapeHtml(trust)}</span></div>
    `;
  }

  // Step 6 — Review & Sign. PayPage has fired and stored the transactionId
  // on state; here we show what's due today, the full ABC agreement text,
  // and a signature pad. The Confirm Membership button on this step is
  // what actually calls /submit (which creates the ABC agreement and
  // uploads the signed PDF).
  function renderStep8() {
    const plan = state.selectedPlan || {};
    // CC/ACH variant: if the member picked ACH AND this plan has an ACH
    // variant configured, show the ACH amounts. Otherwise show CC amounts.
    // The server resolves the same way at /submit time, so the displayed
    // prices always match what's actually billed.
    const usesAch = state.paymentMethodChoice === 'ach' && plan.has_ach_variant;
    const todayAmt = usesAch && plan.today_amount_ach != null ? plan.today_amount_ach : plan.today_amount;
    const monthlyAmt = usesAch && plan.monthly_amount_ach != null ? plan.monthly_amount_ach : plan.monthly_amount;
    const today = money(todayAmt);
    const monthly = money(monthlyAmt);
    const loc = state.config?.location?.display_name || '';
    const memberName = `${state.contact.first_name || ''} ${state.contact.last_name || ''}`.trim();
    const canSubmit = state.signatureHasInk && state.typedSignature.trim().length >= 2 && state.agreementAcknowledged && !state.submittingAgreement;
    return `
      <div class="wcs-section">
        <div class="wcs-due-breakdown">
          ${plan.enrollment_fee != null && plan.enrollment_fee > 0
            ? `<div class="wcs-due-line"><span>Enrollment Fee</span><b>${money(plan.enrollment_fee)}</b></div>`
            : ''}
          <div class="wcs-due-line"><span>Monthly Dues</span><b>${monthly}</b></div>
          <div class="wcs-due-line is-total"><span>Total Due Today</span><b>${today}</b></div>
        </div>
        <p class="wcs-due-note">
          ${escapeHtml(plan.plan_label || 'Membership')}${loc ? ' · ' + escapeHtml(loc) : ''}
        </p>
      </div>

      <div class="wcs-section">
        <div class="wcs-section-label">Membership Agreement</div>
        <div class="wcs-agreement-scroll" id="wcs-agreement-scroll">
          ${getAgreementBodyHtml()}
        </div>
      </div>

      <div class="wcs-section">
        <div class="wcs-section-label">Signature</div>
        <div class="wcs-sig-pad-wrap">
          <canvas id="wcs-sig-canvas" class="wcs-sig-canvas" width="600" height="180" aria-label="Sign here"></canvas>
          <button type="button" class="wcs-sig-clear" data-action="clear-signature">Clear</button>
        </div>
        <div class="wcs-field" style="margin-top: 12px;">
          <label for="wcs-typed-sig">Type your full legal name</label>
          <input id="wcs-typed-sig" type="text" name="typed_signature"
                 value="${escapeHtml(state.typedSignature || '')}"
                 autocomplete="off"
                 data-action="type-signature"
                 placeholder="${escapeHtml(memberName || 'Your full legal name')}" />
        </div>
        <label class="wcs-checkbox" style="margin-top: 8px;">
          <input type="checkbox" data-action="toggle-acknowledge"
                 ${state.agreementAcknowledged ? 'checked' : ''}
                 ${state.agreementScrolledToBottom ? '' : 'disabled'} />
          <span>I have read, understand, and agree to the terms above, and authorize the recurring billing described in this agreement.</span>
        </label>
        <div class="wcs-scroll-hint" ${state.agreementScrolledToBottom ? 'style="display:none;"' : ''}>
          Please scroll to the bottom of the agreement above to enable this checkbox.
        </div>
      </div>

      <button class="wcs-btn wcs-btn-primary wcs-btn-cta" data-action="confirm-membership"
              ${canSubmit ? '' : 'disabled'} style="margin-top: 12px;">
        ${state.submittingAgreement
          ? '<span class="wcs-spinner" style="margin-right:8px;"></span>Activating Membership…'
          : 'Confirm Membership'}
      </button>
    `;
  }

  function renderStep9() {
    if (state.successData?.pending) {
      return `
        <div class="wcs-loading-block">
          <span class="wcs-spinner"></span>
          <p>Activating your membership…</p>
        </div>
      `;
    }
    if (state.successData?.error) {
      const phone = state.config.location.phone || state.config.copy?.support_phone || 'us';
      return `
        <div class="wcs-alert wcs-alert-error">${escapeHtml(state.successData.error)}</div>
        <p>Please call ${escapeHtml(phone)} — we'll get you sorted.</p>
      `;
    }
    const s = state.successData;
    const heading = state.config.copy?.step_7_welcome_heading
      || state.config.copy?.step_6_welcome_heading
      || 'Welcome to the WCS family!';
    const body = state.config.copy?.step_7_welcome_body
      || state.config.copy?.step_6_welcome_body
      || 'Your membership is active. Please check your email and text for next steps!';
    const siteUrl = state.config.copy?.website_url || 'https://westcoaststrength.com';
    const hasBreakdown = s.today_amount != null || s.monthly_amount != null || s.enrollment_fee != null;
    return `
      <div class="wcs-success">
        <div class="wcs-checkmark">${ICONS.check}</div>
        <h1>${escapeHtml(heading)}</h1>
        <p style="margin-top: 8px;">${escapeHtml(body)}</p>
        ${hasBreakdown ? `
          <div class="wcs-due-breakdown wcs-due-breakdown--success">
            ${s.enrollment_fee != null && s.enrollment_fee > 0
              ? `<div class="wcs-due-line"><span>Enrollment Fee</span><b>${money(s.enrollment_fee)}</b></div>`
              : ''}
            ${s.monthly_amount != null
              ? `<div class="wcs-due-line"><span>Monthly Dues</span><b>${money(s.monthly_amount)}</b></div>`
              : ''}
            ${s.today_amount != null
              ? `<div class="wcs-due-line is-total"><span>Charged Today</span><b>${money(s.today_amount)}</b></div>`
              : ''}
          </div>
        ` : ''}
        <a class="wcs-btn wcs-btn-primary wcs-btn-cta" href="${escapeHtml(siteUrl)}" target="_top" rel="noopener" style="margin-top: 16px;">Back to West Coast Strength →</a>
      </div>
    `;
  }

  function renderFooter() {
    const onConfirm = state.currentStep === 9 && state.successData && !state.successData.pending;
    if (onConfirm) {
      return ''; // no footer on success/error confirm view
    }

    let primary = '';
    let primaryDisabled = false;
    switch (state.currentStep) {
      case 1: primary = ''; break; // location cards are themselves the action
      case 2: primary = ''; break; // per-card "Select" advances to the term step
      case 3: primary = ''; break; // per-card "Continue" picks the term + advances
      case 4: primary = `<button class="wcs-btn wcs-btn-primary wcs-btn-cta" data-action="continue-from-contact">Continue →</button>`; break;
      case 5: primary = `<button class="wcs-btn wcs-btn-primary wcs-btn-cta" data-action="continue-from-household">Continue →</button>`; break;
      case 6: primaryDisabled = !state.paymentMethodChoice;
              primary = `<button class="wcs-btn wcs-btn-primary wcs-btn-cta" data-action="continue-from-pay" ${primaryDisabled ? 'disabled' : ''}>Continue to payment →</button>`; break;
      case 7: primary = ''; break;
      case 8: primary = ''; break; // confirm button lives inside the review step body
    }

    // When a location is hard-coded (?location= / data-location) the picker is
    // skipped, so the first reachable step is 2 — don't offer Back from there.
    const minStep = DEFAULT_LOCATION_ID ? 2 : 1;
    const secondary = state.currentStep > minStep && state.currentStep < 9
      ? `<button class="wcs-btn wcs-btn-secondary" data-action="back">← Back</button>`
      : `<span></span>`;

    if (state.currentStep === 1) return '';
    return `<div class="wcs-panel-footer">${secondary}${primary || '<span></span>'}</div>`;
  }

  // WCS badge — rendered inline with the step-1 panel header by
  // renderPanelHeader. Host pages can override the URL via
  // data-logo-url="..." on the host element.
  const DEFAULT_LOGO_URL = 'https://westcoaststrength.com/wp-content/uploads/2023/02/Untitled-design-26-1024x1024.png';

  function render() {
    const bodyFn = ({ 1: renderStep1, 2: renderStep2, 3: renderStep3, 4: renderStep4, 5: renderStep5, 6: renderStep6, 7: renderStep7, 8: renderStep8, 9: renderStep9 }[state.currentStep]) || renderStep1;
    const flash = state.flashMessage
      ? `<div class="wcs-alert ${state.flashMessage.type === 'error' ? 'wcs-alert-error' : 'wcs-alert-info'}">${escapeHtml(state.flashMessage.text)}</div>`
      : '';
    // Widen the panel on the card-selection steps (location/type/term) so up to
    // 4 membership types fit comfortably in a row.
    const wide = [1, 2, 3].includes(state.currentStep) ? ' wcs-container--wide' : '';
    root.innerHTML = `
      <div class="wcs-container${wide}">
        <div class="wcs-panel">
          ${renderPanelHeader()}
          <div class="wcs-panel-body">
            ${flash}
            ${bodyFn()}
          </div>
          ${renderFooter()}
        </div>
      </div>
      ${renderCancellationModal()}
    `;
    state.flashMessage = null;
    attachListeners();
    if (state.currentStep === 8) {
      initSignaturePad();
      initAgreementScrollGate();
    }
  }

  // ----- Events -----------------------------------------------------------
  function flash(type, text) { state.flashMessage = { type, text }; }
  function attachListeners() {
    root.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', (e) => handleAction(el.dataset.action, el, e));
    });
    root.querySelectorAll('input, select, textarea').forEach(el => {
      el.addEventListener('input', handleInputChange);
      el.addEventListener('change', handleInputChange);
    });
  }
  function handleInputChange(e) {
    const el = e.target;
    // Step 6 acknowledge checkbox doesn't carry a `name` — match on data-action.
    if (el.type === 'checkbox' && el.dataset?.action === 'toggle-acknowledge') {
      state.agreementAcknowledged = el.checked;
      updateConfirmButton();
      return;
    }
    const name = el.name;
    // Step 6 typed-signature input.
    if (name === 'typed_signature') {
      state.typedSignature = el.value;
      updateConfirmButton();
      return;
    }
    if (!name) return;
    // Household member fields: name = `sec-<index>-<field>`.
    if (name.startsWith('sec-')) {
      const m = name.match(/^sec-(\d+)-(.+)$/);
      if (m) {
        const idx = Number(m[1]);
        const key = m[2];
        if (state.secondaryMembers[idx]) {
          let v = el.value;
          if (key === 'cell_phone') { v = formatPhoneInput(v); el.value = v; }
          else if (key === 'birthday') { v = formatBirthdayInput(v); el.value = v; }
          state.secondaryMembers[idx][key] = v;
        }
      }
      saveState();
      return;
    }
    if (el.type === 'checkbox') {
      if (name === 'marketing_email') state.marketing.email = el.checked;
      else if (name === 'marketing_sms') state.marketing.sms = el.checked;
      else if (name === 'terms') state.termsAccepted = el.checked;
    } else if (name.startsWith('ec_')) {
      const k = name.slice(3);
      state.emergencyContact[k] = name.endsWith('phone') ? formatPhoneInput(el.value) : el.value;
      if (name.endsWith('phone')) el.value = state.emergencyContact[k];
    } else if (name in state.contact) {
      let v = el.value;
      if (name === 'cell_phone') { v = formatPhoneInput(v); el.value = v; }
      else if (name === 'birthday') { v = formatBirthdayInput(v); el.value = v; }
      else if (name === 'state') v = v.toUpperCase().slice(0, 2);
      state.contact[name] = v;
    }
    saveState();
  }
  async function handleAction(action, el, e) {
    if (action === 'back') {
      // Non-family flows skip the household step (5): pay(6) → back → contact(4).
      if (state.currentStep === 6 && !isFamilyType()) return goto(4);
      return goto(state.currentStep - 1);
    }
    if (action === 'show-cancellation') {
      if (e && typeof e.preventDefault === 'function') e.preventDefault();
      state.showCancellation = true; render(); return;
    }
    if (action === 'hide-cancellation') {
      // Close on the × button or an overlay-background click, but ignore clicks
      // that land inside the modal body.
      if (el.classList?.contains('wcs-modal-close') || (e && e.target === el)) {
        state.showCancellation = false; render();
      }
      return;
    }
    if (action === 'choose-location') {
      const slug = el.dataset.slug;
      if (!slug) return;
      // If they pick the same location they already loaded, just advance.
      if (state.currentLocationId === slug && state.config) return goto(2);
      try {
        state.locationLoading = true;
        state.currentLocationId = slug;
        // Re-hydrate per-location draft state if there's any.
        applyStoredStateFor(slug);
        render();
        const cfg = await fetchConfig(slug);
        state.config = cfg;
        state.locationLoading = false;
        saveState();
        goto(2);
      } catch (err) {
        state.locationLoading = false;
        state.currentLocationId = null;
        state.config = null;
        flash('error', err.message || 'Could not load that location.');
        render();
      }
      return;
    }
    if (action === 'choose-type') {
      // Step 2 — pick a membership type and drill into its terms.
      const type = (state.config.types || []).find(t => t.id === el.dataset.typeId);
      if (type) {
        state.selectedType = type;
        // Term + household are downstream of the type — reset them so a switch
        // doesn't carry a stale term/tier or household into the new type.
        state.selectedTerm = null;
        state.secondaryMembers = [];
        state.selectedPlan = null;
        saveState();
        goto(3);
      }
      return;
    }
    if (action === 'choose-term') {
      // Step 3 — pick a term. Keep the term object (with tiers) and reset the
      // household so pricing starts from the base tier.
      const found = findTermByPlanId(el.dataset.planId);
      if (found) {
        state.selectedType = found.type;
        state.selectedTerm = found.term;
        state.secondaryMembers = [];
        state.selectedPlan = planFromTerm(found.type, found.term);
        saveState();
        goto(4);
      }
      return;
    }
    if (action === 'select-pm') {
      state.paymentMethodChoice = el.dataset.pm;
      render(); saveState();
      return;
    }
    if (action === 'continue-from-contact') {
      // Contact step → validate + server-side eligibility, then household
      // (family types) or payment method (everyone else).
      const errors = clientValidateContact();
      state.inlineErrors = errors;
      if (Object.keys(errors).length) { render(); return; }
      if (!state.selectedPlan) { flash('error', 'Please choose a membership and term first.'); goto(2); return; }
      try {
        el.disabled = true;
        const elig = await checkEligibility(state.selectedPlan.id, birthdayToIso(state.contact.birthday));
        if (!elig.ok) { flash('error', elig.body?.error || 'Eligibility check failed.'); render(); return; }
        if (elig.body.eligible === false) { handleIneligible(elig.body); return; }
        goto(isFamilyType() ? 5 : 6);
      } finally { el.disabled = false; }
      return;
    }
    if (action === 'add-secondary') {
      if (state.secondaryMembers.length < maxSecondaries()) {
        state.secondaryMembers.push({ first_name: '', last_name: '', birthday: '', email: '', cell_phone: '' });
        syncSelectedPlanToHousehold();
        render();
      }
      return;
    }
    if (action === 'remove-secondary') {
      const idx = Number(el.dataset.index);
      if (Number.isInteger(idx)) {
        state.secondaryMembers.splice(idx, 1);
        state.inlineErrors = {};
        syncSelectedPlanToHousehold();
        render();
      }
      return;
    }
    if (action === 'continue-from-household') {
      // Family memberships must include the minimum household members.
      const baseCap = currentTiers()[0]?.max_members || 1;
      const minSec = isFamilyType() ? Math.max(0, baseCap - 1) : 0;
      if (state.secondaryMembers.length < minSec) {
        flash('error', `Please add at least ${minSec} household member${minSec === 1 ? '' : 's'} for a family membership.`);
        render(); return;
      }
      const errors = clientValidateSecondary();
      state.inlineErrors = errors;
      if (Object.keys(errors).length) { render(); return; }
      syncSelectedPlanToHousehold();
      goto(6);
      return;
    }
    if (action === 'continue-from-pay') {
      // Payment-method step → create signup row + PayPage URL, then the iframe.
      try {
        el.disabled = true;
        flash('info', 'Setting up secure payment…');
        render();
        const r = await startSignup();
        if (!r.ok) {
          flash('error', (r.body?.errors || []).join(' ') || r.body?.error || `Failed to start (${r.status})`);
          state.currentStep = 6;
          render(); return;
        }
        state.signupId = r.body.signup_id;
        state.paypageUrl = r.body.paypage_url;
        // EFT card-today hybrid: a second pass collects the card for today.
        state.hybrid = !!r.body.hybrid;
        state.paypageUrlToday = r.body.paypage_url_today || null;
        state.hybridPhase = state.hybrid ? 'today' : null;
        state.paypageCardTodayId = null;
        state.paypageBankDraftId = null;
        saveState();
        goto(7);
      } finally {}
      return;
    }
    if (action === 'clear-signature') {
      clearSignaturePad();
      return;
    }
    if (action === 'confirm-membership') {
      return confirmMembership();
    }
    if (action === 'pick-suggested') {
      // From the ineligible view — server already vetted this plan's age rule,
      // so just select it and return to the contact step.
      const found = findTermByPlanId(el.dataset.planId);
      if (found) {
        state.selectedType = found.type;
        state.selectedPlan = planFromTerm(found.type, found.term);
        state.inlineErrors = {};
        saveState();
        flash('info', `Switched to ${found.type.type_label}.`);
        goto(4);
      } else {
        goto(2);
      }
      return;
    }
    if (action === 'back-to-types') return goto(2);
  }

  function handleIneligible(elig) {
    const suggested = (elig.suggested_plans || []).map(p => `
      <div class="wcs-plan-card" data-action="pick-suggested" data-plan-id="${p.id}" style="cursor:pointer;">
        <div class="wcs-plan-row" style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px;">
          <span class="wcs-plan-name" style="font-weight:700;">${escapeHtml(p.plan_label)}</span>
          <div class="wcs-plan-prices" style="text-align:right;font-size:12px;">
            <div><b>${money(p.today_amount)}</b> today</div>
            <div>then <b>${money(p.monthly_amount)}</b>/mo</div>
          </div>
        </div>
      </div>
    `).join('');
    const phone = state.config.location.phone || state.config.copy?.support_phone || '';
    root.innerHTML = `
      <div class="wcs-panel">
        <div class="wcs-panel-header">
          <div>
            <div class="wcs-eyebrow">Different membership needed</div>
            <h1>This membership isn't quite right</h1>
          </div>
          <span class="wcs-progress-pill">Step 4 / ${TOTAL_STEPS}</span>
        </div>
        <div class="wcs-panel-progress"><div class="wcs-panel-progress-fill" style="width: ${(4/TOTAL_STEPS)*100}%;"></div></div>
        <div class="wcs-panel-body">
          <div class="wcs-alert wcs-alert-info">${escapeHtml(elig.ineligible_message || 'Please choose a different membership.')}</div>
          ${suggested ? `<div class="wcs-section-label">Memberships that fit you</div><div class="wcs-plan-list">${suggested}</div>`
                      : `<p>No other memberships fit online. Please call ${escapeHtml(phone || 'us')} and we'll find the right fit.</p>`}
        </div>
        <div class="wcs-panel-footer">
          <button class="wcs-btn wcs-btn-secondary" data-action="back-to-types">← Back to memberships</button>
          <span></span>
        </div>
      </div>
    `;
    attachListeners();
  }

  function goto(step) {
    if (step < 1) step = 1;
    // Hard-coded location: never return to the location picker (step 1).
    if (DEFAULT_LOCATION_ID && step < 2) step = 2;
    state.currentStep = step;
    state.inlineErrors = {};
    state.showCancellation = false;
    saveState();
    render();
    scrollWidgetToTop();
  }

  // Scroll the widget back to the top whenever the step changes — without
  // this, picking a location near the bottom of the step-1 list on mobile
  // leaves the viewport scrolled past the new step's content. Tries
  // scrollIntoView first (works inside an iframe-embedded WP page) and
  // falls back to window.scrollTo for the standalone widget URL.
  function scrollWidgetToTop() {
    try {
      if (root && typeof root.scrollIntoView === 'function') {
        root.scrollIntoView({ behavior: 'auto', block: 'start' });
      }
    } catch (_) {}
    try { window.scrollTo(0, 0); } catch (_) {}
  }

  // ----- PayPage postMessage ----------------------------------------------
  function extractTransaction(data) {
    if (!data) return null;
    if (typeof data === 'string') { try { data = JSON.parse(data); } catch (_) { return null; } }
    if (typeof data !== 'object') return null;
    const id = data.transactionId || data.payPageTransactionId
      || data.tokenId || data.token || data.paypageTransactionId || null;
    const type = (data.paymentType || data.payment_type || '').toLowerCase();
    let paymentType = state.paymentMethodChoice === 'ach' ? 'Bank Account' : 'Credit Card';
    if (type.includes('bank') || type.includes('ach') || type.includes('eft')) paymentType = 'Bank Account';
    else if (type.includes('card') || type.includes('credit')) paymentType = 'Credit Card';
    return id ? { id, paymentType } : null;
  }
  function advanceToReview() {
    state.currentStep = 8;
    // Reset the scroll-to-bottom gate every time we land on the review step.
    state.agreementScrolledToBottom = false;
    state.agreementAcknowledged = false;
    saveState();
    render();
    scrollWidgetToTop();
  }
  window.addEventListener('message', async (event) => {
    if (event.origin !== PAYPAGE_ORIGIN) return;
    if (state.currentStep < 7) return;
    const tx = extractTransaction(event.data);
    if (!tx) return;
    // Don't call /submit yet — that happens after the member signs (step 8).
    if (state.hybrid) {
      if (state.hybridPhase === 'today') {
        // Card tokenized for today's charge — move to the bank (recurring) pass.
        state.paypageCardTodayId = tx.id;
        state.hybridPhase = 'draft';
        saveState();
        render();           // re-render step 7 with the bank iframe + new header
        scrollWidgetToTop();
        return;
      }
      // Bank tokenized for recurring — both legs captured, go review.
      state.paypageBankDraftId = tx.id;
      saveState();
      advanceToReview();
      return;
    }
    // Single-pass (card-only or $0-today bank).
    state.paypageTransactionId = tx.id;
    state.paypagePaymentType = tx.paymentType;
    saveState();
    advanceToReview();
  });

  async function confirmMembership() {
    if (state.submittingAgreement) return;
    const haveTokens = state.hybrid
      ? (state.paypageCardTodayId && state.paypageBankDraftId)
      : state.paypageTransactionId;
    if (!haveTokens) {
      state.flashMessage = { type: 'error', text: 'Payment session expired. Please reload and try again.' };
      render();
      return;
    }
    state.submittingAgreement = true;
    state.successData = { pending: true };
    render();
    const submitBody = state.hybrid
      ? {
          signup_id: state.signupId,
          today_transaction_id: state.paypageCardTodayId,
          today_payment_type: 'Credit Card',
          draft_transaction_id: state.paypageBankDraftId,
          draft_payment_type: 'Bank Account',
        }
      : {
          signup_id: state.signupId,
          paypage_transaction_id: state.paypageTransactionId,
          paypage_payment_type: state.paypagePaymentType,
        };
    submitBody.signature_data_url = state.signatureDataUrl;
    submitBody.typed_signature = state.typedSignature;
    submitBody.agreement_acknowledged = state.agreementAcknowledged;
    const r = await api('/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(submitBody),
    });
    state.submittingAgreement = false;
    if (r.ok && r.body?.success) {
      state.successData = r.body;
      state.currentStep = 9;
      clearStoredState();
      render();
      scrollWidgetToTop();
    } else {
      state.successData = { error: r.body?.error || 'We could not finalize your membership. Our team has been notified.' };
      state.currentStep = 9;
      render();
      scrollWidgetToTop();
    }
  }

  // ----- Boot --------------------------------------------------------------
  function applyStoredStateFor(slug) {
    const stored = loadStoredStateFor(slug);
    // Reset per-location fields to defaults first so previous picks don't bleed.
    Object.assign(state.contact, {
      first_name: '', last_name: '', email: '', cell_phone: '',
      birthday: '', gender: '',
      address_line1: '', address_line2: '', city: '', state: 'OR', zip_code: '',
    });
    Object.assign(state.emergencyContact, { first_name: '', last_name: '', phone: '' });
    state.marketing = { email: true, sms: true };
    state.termsAccepted = false;
    state.paymentMethodChoice = null;
    state.signupId = null;
    state.paypageUrl = null;
    state.selectedType = null;
    state.selectedPlan = null;
    if (!stored) return;
    if (stored.contact) Object.assign(state.contact, stored.contact);
    if (stored.emergencyContact) Object.assign(state.emergencyContact, stored.emergencyContact);
    if (stored.marketing) Object.assign(state.marketing, stored.marketing);
    state.termsAccepted = !!stored.termsAccepted;
    state.paymentMethodChoice = stored.paymentMethodChoice || null;
    state.signupId = stored.signupId || null;
    state.paypageUrl = stored.paypageUrl || null;
    if (stored.selectedPlanId && state.config?.types) {
      const found = findTermByPlanId(stored.selectedPlanId);
      if (found) {
        state.selectedType = found.type;
        state.selectedPlan = planFromTerm(found.type, found.term);
      }
    }
    state.currentStep = Math.min(stored.currentStep || 1, 4);
  }

  async function init() {
    // Load list of locations first (always needed for the step-1 picker).
    try {
      state.locations = await fetchLocations();
    } catch (err) {
      state.locationsError = err.message;
      render();
      return;
    }

    // If the host pre-set a default location (or we have one stored from a
    // previous session) auto-load that config so the user can resume.
    const stored = loadStoredGlobal();
    const resumeSlug = (stored?.currentLocationId) || DEFAULT_LOCATION_ID;
    const exists = resumeSlug && state.locations.some(l => l.wcs_location_id === resumeSlug);
    if (exists) {
      state.currentLocationId = resumeSlug;
      applyStoredStateFor(resumeSlug);
      try {
        state.config = await fetchConfig(resumeSlug);
        // When the host hard-codes a location (?location=slug or
        // data-location), skip the picker entirely and start at the membership
        // step. Without an explicit location we stay on the chooser.
        state.currentStep = DEFAULT_LOCATION_ID ? 2 : 1;
        render();
        return;
      } catch (_) {
        // Fall through to chooser
        state.currentLocationId = null;
        state.config = null;
      }
    }

    state.currentStep = 1;
    render();
  }
  init();
})();
</script>
